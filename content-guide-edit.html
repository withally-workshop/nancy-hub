<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Content Guide Editor — Hello Nancy</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
/* ── BASE (mirrors public guide) ── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{background:#000;color:#fff;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;min-height:100vh;overflow-x:hidden;-webkit-tap-highlight-color:transparent;}
button{font-family:inherit;}
:root{--m:#FF00AA;--border:#1e1e1e;--card-bg:#0d0d0d;}
#app{max-width:960px;margin:0 auto;min-height:100vh;}

/* ── AUTH GATE ── */
#gate{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:0.8rem;padding:2rem;}
.gate-logo{font-size:2.2rem;font-weight:900;color:var(--m);letter-spacing:-0.02em;}
.gate-sub{font-size:0.7rem;color:#555;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:0.5rem;}
.g-in{width:100%;max-width:300px;background:#111;border:1px solid #222;color:#fff;padding:0.7rem 0.9rem;border-radius:8px;font-size:0.88rem;}
.g-in:focus{outline:none;border-color:var(--m);}
.g-btn{width:100%;max-width:300px;background:var(--m);color:#fff;border:none;padding:0.75rem;border-radius:8px;font-weight:800;cursor:pointer;font-size:0.9rem;}
.g-btn:disabled{opacity:0.5;}
.g-err{color:#ff6b6b;font-size:0.75rem;text-align:center;}

/* ── EDITOR HEADER (mirrors public guide top-header) ── */
#editor{display:none;padding-bottom:5rem;}
.top-header{padding:1.75rem 1.25rem 0.75rem;background:#000;border-bottom:1px solid #111;display:flex;align-items:flex-start;justify-content:space-between;position:sticky;top:0;z-index:50;}
.top-title{font-size:2.1rem;font-weight:900;letter-spacing:-0.03em;line-height:1;color:#fff;}
.top-sub{font-size:0.78rem;font-weight:700;color:#888;margin-top:0.2rem;}

/* ── VIDEO ENTRY — two-column layout ── */
.video-entry{display:flex;gap:0.55rem;padding:0.9rem 0.75rem 1rem;border-bottom:2px solid #111;align-items:flex-start;}
.ve-left{width:126px;flex-shrink:0;}
.ve-embed{width:126px;height:176px;border:2px solid var(--m);border-radius:8px;overflow:hidden;background:#111;position:relative;cursor:pointer;}
.ve-embed::after{content:'';position:absolute;inset:0;z-index:2;cursor:pointer;}
.ve-embed iframe{width:100%;height:100%;border:none;display:block;}
.ve-embed .video-embed-wrap{border:none!important;width:100%;height:100%;position:absolute;top:0;left:0;}
.ve-embed .video-embed-wrap.tiktok-wrap iframe,.ve-embed .video-embed-wrap.instagram-wrap iframe{width:325px!important;height:580px!important;aspect-ratio:unset!important;max-height:none!important;transform:scale(0.388);transform-origin:top left;}
.ve-embed .video-embed-wrap.facebook-wrap iframe,.ve-embed .video-embed-wrap.twitter-wrap iframe{width:500px!important;height:900px!important;aspect-ratio:unset!important;max-height:none!important;transform:scale(0.252);transform-origin:top left;}
.ve-link{display:block;font-size:0.48rem;color:#333;margin-top:0.3rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:126px;text-decoration:none;}
.ve-link:hover{color:var(--m);}

/* ── LEFT META FIELDS ── */
.ve-meta{margin-top:0.35rem;border:1px solid #111;border-radius:4px;overflow:hidden;}
.ve-meta-item{display:flex;align-items:baseline;gap:0.2rem;padding:0.12rem 0.3rem;border-bottom:1px solid #0d0d0d;}
.ve-meta-item:last-child{border-bottom:none;}
.ve-meta-lbl{font-size:0.43rem;font-weight:800;text-transform:uppercase;letter-spacing:0.07em;color:#333;white-space:nowrap;min-width:30px;}
input.ve-meta-in{flex:1;background:transparent;border:none;color:#666;font-size:0.58rem;font-family:inherit;outline:none;min-width:0;}
input.ve-meta-in::placeholder{color:#252525;}
input.ve-meta-in:focus{color:#aaa;}

/* ── LEFT SECTION LABELS + TEXTAREAS ── */
.ve-sec-lbl{font-size:0.43rem;font-weight:800;text-transform:uppercase;letter-spacing:0.1em;color:#333;padding:0.3rem 0 0.08rem;}
textarea.ve-ta-l{width:100%;background:#090909;border:1px solid #111;border-radius:3px;color:#777;font-size:0.58rem;line-height:1.4;padding:0.25rem 0.3rem;resize:vertical;min-height:38px;font-family:inherit;outline:none;}
textarea.ve-ta-l:focus{border-color:#1e1e1e;color:#aaa;}

/* ── RIGHT COLUMN ── */
.ve-right{flex:1;min-width:0;}
.ve-hdr{display:flex;justify-content:space-between;align-items:center;gap:0.3rem;margin-bottom:0.4rem;}
input.ve-title-ed{flex:1;font-size:0.78rem;font-weight:800;color:#fff;background:transparent;border:none;border-bottom:1px dashed #222;outline:none;font-family:inherit;padding:0 0 0.1rem;}
input.ve-title-ed:focus{border-bottom-color:var(--m);}

/* ── RIGHT TEXTAREAS + INPUTS ── */
textarea.ve-ta-r{width:100%;background:transparent;border:1px solid #181818;border-radius:4px;color:#aaa;font-size:0.62rem;line-height:1.4;padding:0.28rem 0.4rem;resize:vertical;min-height:44px;font-family:inherit;outline:none;margin-top:0.08rem;}
textarea.ve-ta-r:focus{border-color:#2a2a2a;}
input.ve-field-in{width:100%;background:transparent;border:1px solid #181818;border-radius:4px;color:#888;font-size:0.6rem;padding:0.22rem 0.4rem;font-family:inherit;outline:none;margin-top:0.08rem;}
input.ve-field-in:focus{border-color:#2a2a2a;color:#aaa;}
.ve-divider{border:none;border-top:1px solid #111;margin:0.5rem 0;}

/* ── MIC / CLEAR INLINE ── */
.mic-row{display:flex;gap:0.25rem;margin:0.15rem 0 0.4rem;}
.mic-btn{background:none;border:1px solid #1e1e1e;color:#444;padding:0.15rem 0.4rem;border-radius:4px;font-size:0.7rem;cursor:pointer;transition:all 0.15s;}
.mic-btn:hover{border-color:var(--m);color:var(--m);}
.mic-btn.on{border-color:var(--m);color:var(--m);animation:blink 0.9s infinite;}
.clr-btn{background:none;border:1px solid #161616;color:#2e2e2e;padding:0.15rem 0.35rem;border-radius:4px;font-size:0.65rem;cursor:pointer;transition:all 0.15s;}
.clr-btn:hover{border-color:#444;color:#888;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.35}}

/* ── STATUS BADGE ── */
.ve-status{display:inline-block;padding:0.1rem 0.38rem;border-radius:3px;font-size:0.52rem;font-weight:800;letter-spacing:0.09em;text-transform:uppercase;white-space:nowrap;}
.ve-status.live{background:#0a2a0a;color:#4caf50;}
.ve-status.pending{background:#2b1c00;color:#f5a623;}
.ve-status.draft{background:#1a1a1a;color:#555;}

/* ── TAG ROW ── */
.tag-row{padding:0.35rem 0.4rem 0.3rem;border-top:1px solid #111;background:#080808;}
.tag-cat-row{display:flex;flex-wrap:wrap;align-items:center;gap:0.25rem;margin-bottom:0.22rem;}
.tag-cat-row:last-child{margin-bottom:0;}
.tag-row-label{font-size:0.48rem;font-weight:800;letter-spacing:0.1em;text-transform:uppercase;color:#333;min-width:44px;flex-shrink:0;}
.tag-row-label[data-cat="People"]  {color:#d966ff;}
.tag-row-label[data-cat="Product"] {color:#44ff99;}
.tag-row-label[data-cat="Location"]{color:#ffcc44;}
.tag-row-label[data-cat="Prop"]    {color:#44aaff;}
.tag-pill{padding:0.1rem 0.4rem;border-radius:10px;border:1px solid #222;color:#3a3a3a;font-size:0.58rem;font-weight:700;cursor:pointer;user-select:none;transition:all 0.15s;}
.tag-pill[data-cat="People"].on  {border-color:#d966ff;color:#d966ff;background:rgba(217,102,255,0.08);}
.tag-pill[data-cat="Product"].on {border-color:#44ff99;color:#44ff99;background:rgba(68,255,153,0.08);}
.tag-pill[data-cat="Location"].on{border-color:#ffcc44;color:#ffcc44;background:rgba(255,204,68,0.08);}
.tag-pill[data-cat="Prop"].on    {border-color:#44aaff;color:#44aaff;background:rgba(68,170,255,0.08);}
.tag-pill .tag-x{margin-left:0.2rem;font-size:0.5rem;opacity:0.5;cursor:pointer;}
.tag-pill .tag-x:hover{opacity:1;color:#ff4444;}
.tag-add-row{display:flex;align-items:center;gap:0.25rem;margin-top:0.3rem;padding-top:0.3rem;border-top:1px solid #111;}
.tag-add-row input{flex:1;background:#0a0a0a;border:1px solid #222;color:#aaa;font-size:0.58rem;padding:0.2rem 0.35rem;border-radius:6px;font-family:inherit;outline:none;min-width:0;}
.tag-add-row input:focus{border-color:var(--m);}
.tag-add-row select{background:#0a0a0a;border:1px solid #222;color:#888;font-size:0.55rem;padding:0.18rem 0.25rem;border-radius:6px;font-family:inherit;outline:none;}
.tag-add-row select:focus{border-color:var(--m);}
.tag-add-btn{background:none;border:1px solid var(--m);color:var(--m);font-size:0.6rem;font-weight:800;padding:0.15rem 0.45rem;border-radius:6px;cursor:pointer;white-space:nowrap;}
.tag-add-btn:hover{background:var(--m);color:#fff;}

/* ── PEOPLE SCHEDULE PILLS ── */
.sched-pill{display:inline-flex;align-items:center;gap:0.3rem;padding:0.22rem 0.65rem;border-radius:20px;font-size:0.68rem;font-weight:700;border:1px solid #222;color:#888;background:#0d0d0d;white-space:nowrap;transition:all 0.15s;}
.sched-pill:hover{border-color:#444;}
.sched-pill .sched-name{color:#fff;}
.sched-pill .sched-time{color:#888;font-weight:600;}
.sched-pill.priority{border-color:var(--m);background:rgba(255,0,170,0.08);}
.sched-pill.priority .sched-name{color:var(--m);}
.sched-pill.priority .sched-time{color:rgba(255,0,170,0.7);}
.sched-pill.tbc{border-style:dashed;opacity:0.6;}
.sched-add-btn{background:none;border:1px dashed #333;color:#555;font-size:0.62rem;font-weight:700;padding:0.2rem 0.55rem;border-radius:20px;cursor:pointer;transition:all 0.15s;}
.sched-add-btn:hover{border-color:var(--m);color:var(--m);}
.sched-modal{position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:999;display:flex;align-items:center;justify-content:center;}
.sched-modal-inner{background:#111;border:1px solid #333;border-radius:12px;padding:1.2rem;width:90%;max-width:320px;}
.sched-modal-inner h3{font-size:0.85rem;color:#fff;margin-bottom:0.8rem;}
.sched-modal-inner label{display:block;font-size:0.65rem;color:#888;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;margin:0.5rem 0 0.2rem;}
.sched-modal-inner input,.sched-modal-inner select{width:100%;background:#0a0a0a;border:1px solid #222;color:#fff;font-size:0.75rem;padding:0.45rem 0.55rem;border-radius:6px;font-family:inherit;outline:none;}
.sched-modal-inner input:focus,.sched-modal-inner select:focus{border-color:var(--m);}
.sched-modal-btns{display:flex;gap:0.5rem;margin-top:1rem;}
.sched-modal-btns button{flex:1;padding:0.45rem;border-radius:6px;font-size:0.72rem;font-weight:800;cursor:pointer;border:none;}
.sched-modal-save{background:var(--m);color:#fff;}
.sched-modal-cancel{background:#222;color:#888;}
.sched-modal-delete{background:#331111;color:#ff4444;}

/* ── TAB BAR ── */
.cg-tab-bar{display:flex;background:#111;border-radius:10px;margin:0.75rem 1.25rem;padding:3px;gap:3px;}
.cg-tab-item{flex:1;text-align:center;padding:0.5rem 0.35rem;border-radius:8px;font-size:0.72rem;font-weight:700;color:#555;cursor:pointer;transition:all 0.15s;}
.cg-tab-item.active{background:var(--m);color:#fff;}
/* ── CATEGORY GRID ── */
.cat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:0.6rem;padding:0.75rem 1.25rem 1rem;}
.cat-card{background:#0d0d0d;border:1px solid var(--border);border-radius:14px;padding:1rem 0.6rem;text-align:center;cursor:pointer;transition:border-color 0.15s,transform 0.15s;}
.cat-card:hover{border-color:#333;transform:translateY(-1px);}
.cat-card-emoji{font-size:2rem;margin-bottom:0.3rem;}
.cat-card-name{font-size:0.78rem;font-weight:800;color:#fff;letter-spacing:0.01em;}
.cat-card-badge{font-size:0.52rem;font-weight:700;color:var(--m);margin-top:0.25rem;line-height:1.3;}
/* ── CATEGORY DETAIL ── */
.cat-detail-header{display:flex;align-items:center;gap:0.5rem;padding:0 1.25rem 0.75rem;}
.cat-detail-back{background:none;border:none;color:var(--m);font-size:1rem;cursor:pointer;padding:0.25rem;}
.cat-detail-title{font-size:1.1rem;font-weight:800;color:#fff;}
.cat-pill-row{display:flex;gap:4px;background:#111;border-radius:8px;padding:3px;margin:0 1.25rem 1rem;width:fit-content;}
.cat-pill{padding:0.35rem 1rem;border-radius:6px;font-size:0.72rem;font-weight:700;color:#555;cursor:pointer;transition:all 0.15s;}
.cat-pill.active{background:var(--m);color:#fff;}
/* ── CONCEPT SUMMARY CARDS (editor) ── */
.ed-concept-card{background:#0d0d0d;border-radius:10px;border:1px solid var(--border);margin:0 1.25rem 0.5rem;padding:0.65rem 0.75rem;display:flex;align-items:center;gap:0.6rem;cursor:pointer;transition:border-color 0.15s;}
.ed-concept-card:hover{border-color:#333;}
.ed-concept-num{background:var(--m);color:#fff;font-size:0.6rem;font-weight:800;width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.ed-concept-body{flex:1;min-width:0;}
.ed-concept-title{font-size:0.76rem;font-weight:700;color:#ccc;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ed-concept-sub{font-size:0.55rem;color:#444;margin-top:0.1rem;}
.ed-concept-arrow{color:#333;font-size:0.9rem;flex-shrink:0;}
/* ── SHOTS VIEW (editor, inside category) ── */
.shot-filter-pills{display:flex;gap:6px;padding:0 1.25rem 0.75rem;flex-wrap:wrap;}
.shot-filter-pill{font-size:0.6rem;font-weight:700;padding:0.25rem 0.75rem;border-radius:20px;background:#111;color:#555;border:1px solid #222;cursor:pointer;transition:all 0.15s;}
.shot-filter-pill.active{background:var(--m);color:#fff;border-color:var(--m);}
.shot-progress-bar{margin:0 1.25rem 0.75rem;background:#111;border-radius:8px;padding:0.55rem 0.75rem;}
.shot-progress-text{display:flex;justify-content:space-between;font-size:0.68rem;margin-bottom:0.4rem;}
.shot-progress-track{background:#1a1a1a;border-radius:4px;height:6px;overflow:hidden;}
.shot-progress-fill{background:#4caf50;height:100%;border-radius:4px;transition:width 0.3s;}

/* ── RICH SHOT CARDS (Momo-style, editor) ── */
.shot-card-rich{background:#0d0d0d;border-radius:12px;border:1px solid var(--border);margin:0 1.25rem 0.75rem;overflow:hidden;}
.shot-card-rich.done-card{opacity:0.45;}
.shot-card-header{display:flex;align-items:center;gap:0.5rem;padding:0.65rem 0.75rem;border-bottom:1px solid var(--border);}
.shot-card-check{width:18px;height:18px;border-radius:4px;border:2px solid #333;flex-shrink:0;cursor:pointer;transition:all 0.15s;display:flex;align-items:center;justify-content:center;}
.shot-card-check.done{background:#4caf50;border-color:#4caf50;}
.shot-card-check.done::after{content:'✓';color:#fff;font-size:0.65rem;font-weight:800;}
.shot-card-num{background:var(--m);color:#fff;font-size:0.55rem;font-weight:800;width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.shot-card-num.done-num{background:#4caf50;}
.shot-card-hinfo{flex:1;min-width:0;}
.shot-card-label{font-size:0.78rem;font-weight:700;color:#ccc;line-height:1.3;}
.shot-card-label.done-label{text-decoration:line-through;color:#555;}
.shot-card-framing{font-size:0.58rem;color:#555;margin-top:0.1rem;}
.shot-card-type{font-size:0.5rem;font-weight:700;padding:0.12rem 0.5rem;border-radius:10px;flex-shrink:0;text-transform:uppercase;letter-spacing:0.04em;}
.shot-card-type.t-video{background:rgba(68,170,255,0.12);color:#44aaff;}
.shot-card-type.t-photo{background:rgba(68,255,153,0.12);color:#44ff99;}
.shot-card-type.t-still{background:rgba(255,204,68,0.12);color:#ffcc44;}
.shot-card-body{display:flex;}
.shot-card-details{flex:1;padding:0.65rem 0.75rem;border-right:1px solid var(--border);min-width:0;}
.shot-card-refs{width:145px;flex-shrink:0;padding:0.65rem 0.55rem;}
.shot-field-label{font-size:0.48rem;text-transform:uppercase;letter-spacing:0.08em;color:#444;font-weight:700;margin-bottom:0.25rem;}
.shot-field-group{margin-bottom:0.55rem;}
.shot-field-group:last-child{margin-bottom:0;}
.shot-field-tags{display:flex;gap:4px;flex-wrap:wrap;}
.shot-field-tag{font-size:0.52rem;font-weight:600;padding:0.1rem 0.45rem;border-radius:8px;}
.shot-field-tag.tag-product{background:rgba(68,255,153,0.1);color:#44ff99;}
.shot-field-tag.tag-prop{background:rgba(68,170,255,0.1);color:#44aaff;}
.shot-field-tag.tag-location{background:rgba(255,204,68,0.1);color:#ffcc44;}
.shot-onset-grid{display:grid;grid-template-columns:1fr 1fr;gap:0.25rem;}
.shot-onset-item-label{font-size:0.45rem;color:#444;text-transform:uppercase;letter-spacing:0.05em;}
.shot-onset-item-value{font-size:0.62rem;color:#bbb;font-weight:600;}
.shot-recipe{font-size:0.58rem;color:#999;line-height:1.45;background:rgba(255,255,255,0.02);border-radius:6px;padding:0.3rem 0.45rem;}
.shot-director-note{font-size:0.58rem;color:#f5a623;line-height:1.45;background:rgba(245,166,35,0.05);border-radius:6px;padding:0.3rem 0.45rem;}
.shot-ref-vid{background:#111;border-radius:6px;overflow:hidden;border:1px solid #1a1a1a;margin-bottom:0.4rem;cursor:pointer;}
.shot-ref-vid:last-child{margin-bottom:0;}
.shot-ref-thumb{width:100%;height:50px;background:#0a0a0a;position:relative;display:flex;align-items:center;justify-content:center;overflow:hidden;}
.shot-ref-play{width:18px;height:18px;border-radius:50%;background:rgba(255,0,170,0.5);display:flex;align-items:center;justify-content:center;}
.shot-ref-play::after{content:'';border-left:5px solid #fff;border-top:3px solid transparent;border-bottom:3px solid transparent;margin-left:1px;}
.shot-ref-info{padding:0.2rem 0.35rem;}
.shot-ref-num{font-size:0.48rem;color:var(--m);font-weight:700;}
.shot-ref-title{font-size:0.5rem;color:#666;line-height:1.25;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.shot-empty-details{font-size:0.58rem;color:#333;font-style:italic;padding:0.25rem 0;}
.shot-ed-input{width:100%;background:transparent;border:1px solid #222;border-radius:4px;color:#aaa;font-size:0.6rem;padding:0.2rem 0.35rem;font-family:inherit;outline:none;}
.shot-ed-input:focus{border-color:var(--m);color:#ccc;}
.shot-ed-textarea{width:100%;background:transparent;border:1px solid #222;border-radius:4px;color:#aaa;font-size:0.58rem;padding:0.25rem 0.35rem;font-family:inherit;outline:none;resize:vertical;min-height:36px;line-height:1.4;}
.shot-ed-textarea:focus{border-color:var(--m);color:#ccc;}
.shot-ed-select{background:#111;border:1px solid #222;border-radius:4px;color:#aaa;font-size:0.58rem;padding:0.2rem 0.3rem;font-family:inherit;outline:none;cursor:pointer;}
.shot-ed-select:focus{border-color:var(--m);}

/* ── HOME SECTION LABELS + CONCEPT GRID ── */
.home-section-label{font-size:0.6rem;text-transform:uppercase;letter-spacing:0.12em;color:var(--m);font-weight:700;padding:0.75rem 1.25rem 0.5rem;}
.home-section-divider{border-top:1px solid var(--border);margin:0.5rem 1.25rem 0;}
.home-concept-group{margin-bottom:1rem;}
.home-concept-group-header{display:flex;align-items:center;gap:0.4rem;padding:0 1.25rem 0.5rem;}
.home-concept-group-emoji{font-size:0.9rem;}
.home-concept-group-name{font-size:0.78rem;font-weight:700;color:#fff;}
.home-concept-group-count{font-size:0.62rem;color:#666;}
.home-concept-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:0 1.25rem;}
.home-concept-card{background:#0d0d0d;border-radius:8px;border:1px solid var(--border);overflow:hidden;cursor:pointer;transition:transform 0.15s;padding:0.5rem 0.45rem;}
.home-concept-card:hover{border-color:#333;transform:translateY(-1px);}
.home-concept-num{font-size:0.55rem;color:var(--m);font-weight:700;margin-bottom:0.15rem;}
.home-concept-title{font-size:0.6rem;font-weight:700;color:#ccc;line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}

/* ── SHOOT SCHEDULE ── */
.ss-block{margin:0 1.25rem 0.75rem;border:1px solid var(--border);border-radius:14px;overflow:hidden;background:#0a0a0a;}
.ss-block-header{display:flex;align-items:baseline;justify-content:space-between;padding:0.75rem 1rem 0.5rem;cursor:pointer;}
.ss-block-header:hover{background:#0f0f0f;}
.ss-block-loc{font-size:0.95rem;font-weight:800;color:#fff;}
.ss-block-time{font-size:0.72rem;font-weight:700;color:var(--m);margin-left:0.5rem;}
.ss-block-meta{font-size:0.6rem;color:#666;font-weight:600;}
.ss-scene{padding:0.65rem 1rem;border-top:1px solid var(--border);display:flex;gap:0.65rem;align-items:flex-start;cursor:pointer;transition:background 0.12s;}
.ss-scene:hover{background:#0f0f0f;}
.ss-scene-icon{width:36px;height:36px;border-radius:8px;background:#1a1020;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:1rem;}
.ss-scene-body{flex:1;min-width:0;}
.ss-scene-label{font-size:0.76rem;font-weight:800;color:#fff;}
.ss-scene-sub{font-size:0.58rem;color:#666;margin-top:0.1rem;}
.ss-scene-right{font-size:0.58rem;color:var(--m);font-weight:700;text-align:right;flex-shrink:0;white-space:nowrap;}
.ss-concept-chip{margin-top:0.4rem;background:#111;border:1px solid #1e1e1e;border-radius:8px;padding:0.35rem 0.55rem;}
.ss-concept-chip-header{font-size:0.55rem;color:#666;font-weight:600;}
.ss-concept-chip-hook{font-size:0.68rem;color:var(--m);font-weight:700;margin-top:0.1rem;}
.ss-add-btn{width:calc(100% - 2.5rem);margin:0 1.25rem 0.75rem;background:none;border:1px dashed #333;color:#555;padding:0.55rem;border-radius:10px;font-size:0.68rem;font-weight:700;cursor:pointer;transition:all 0.15s;}
.ss-add-btn:hover{border-color:var(--m);color:var(--m);}
/* ── EDIT & PUBLISH KANBAN ── */
.ep-board{display:flex;gap:0.4rem;overflow-x:auto;padding:0.5rem 1.25rem 0.5rem;scrollbar-width:none;-webkit-overflow-scrolling:touch;}
.ep-board::-webkit-scrollbar{display:none;}
.ep-col{min-width:125px;flex-shrink:0;}
.ep-col-header{display:flex;align-items:center;gap:0.3rem;padding:0.3rem 0;margin-bottom:0.35rem;}
.ep-col-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.ep-col-label{font-size:0.56rem;font-weight:800;text-transform:uppercase;letter-spacing:0.05em;color:#888;}
.ep-col-count{font-size:0.56rem;font-weight:800;color:#444;margin-left:auto;}
.ep-card{background:#111;border:1px solid var(--border);border-radius:10px;padding:0.5rem 0.55rem;margin-bottom:0.35rem;cursor:pointer;transition:border-color 0.15s;}
.ep-card:hover{border-color:#444;}
.ep-card-title{font-size:0.66rem;font-weight:700;color:#fff;line-height:1.3;}
.ep-card-meta{font-size:0.52rem;color:#555;margin-top:0.15rem;}
.ep-add-btn{width:calc(100% - 2.5rem);margin:0.25rem 1.25rem 0.75rem;background:none;border:1px dashed #333;color:#555;padding:0.55rem;border-radius:10px;font-size:0.68rem;font-weight:700;cursor:pointer;transition:all 0.15s;}
.ep-add-btn:hover{border-color:var(--m);color:var(--m);}
/* ── GENERIC MODAL (reused for schedule/pipeline) ── */
.cg-modal{position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:999;display:flex;align-items:center;justify-content:center;}
.cg-modal-inner{background:#111;border:1px solid #333;border-radius:12px;padding:1.2rem;width:90%;max-width:340px;max-height:85vh;overflow-y:auto;}
.cg-modal-inner h3{font-size:0.85rem;color:#fff;margin-bottom:0.8rem;}

.cg-modal-inner input,.cg-modal-inner select,.cg-modal-inner textarea{width:100%;background:#0a0a0a;border:1px solid #222;color:#fff;font-size:0.72rem;padding:0.4rem 0.5rem;border-radius:6px;font-family:inherit;outline:none;}
.cg-modal-inner input:focus,.cg-modal-inner select:focus,.cg-modal-inner textarea:focus{border-color:var(--m);}
.cg-modal-inner textarea{resize:vertical;min-height:60px;}
.cg-modal-btns{display:flex;gap:0.5rem;margin-top:1rem;}
.cg-modal-btns button{flex:1;padding:0.45rem;border-radius:6px;font-size:0.72rem;font-weight:800;cursor:pointer;border:none;}

/* ── VIDEO FOOTER ── */
.ve-foot{display:flex;align-items:center;justify-content:space-between;margin-top:0.75rem;gap:0.5rem;}
.ve-guide-btn{background:none;border:1px solid var(--m);color:var(--m);font-size:0.68rem;font-weight:800;cursor:pointer;padding:0.35rem 0.75rem;border-radius:6px;letter-spacing:0.03em;min-height:36px;}
.ve-save-btn{background:var(--m);color:#fff;border:none;padding:0.4rem 1.1rem;border-radius:6px;font-size:0.72rem;font-weight:800;cursor:pointer;letter-spacing:0.03em;min-height:36px;}
.ve-save-btn:disabled{opacity:0.45;}
.ve-saved{font-size:0.65rem;color:#4caf50;font-weight:700;}

/* ── STATUS SWITCHER (always visible, 3 buttons) ── */
.ve-action-row{display:flex;gap:0.4rem;margin-top:0.5rem;}
.ve-approve-btn{flex:1;background:#0a0a0a;border:1px solid #1e2e1e;color:#3a5a3a;padding:0.5rem 0;border-radius:7px;font-size:0.68rem;font-weight:800;cursor:pointer;transition:all 0.15s;min-height:40px;}
.ve-approve-btn:hover,.ve-approve-btn.active{background:#0a2a0a;border-color:#4caf50;color:#4caf50;}
.ve-send-btn{flex:1;background:#0a0a0a;border:1px solid #2a1e00;color:#4a3a00;padding:0.5rem 0;border-radius:7px;font-size:0.68rem;font-weight:800;cursor:pointer;transition:all 0.15s;min-height:40px;}
.ve-send-btn:hover,.ve-send-btn.active{background:#2b1c00;border-color:#f5a623;color:#f5a623;}
.ve-draft-btn{flex:1;background:#0a0a0a;border:1px solid #222;color:#3a3a3a;padding:0.5rem 0;border-radius:7px;font-size:0.68rem;font-weight:800;cursor:pointer;transition:all 0.15s;min-height:40px;}
.ve-draft-btn:hover,.ve-draft-btn.active{background:#1a1a1a;border-color:#555;color:#888;}

/* ── FULL GUIDE EDIT SHEET ── */
.fg-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:200;display:none;}
.fg-overlay.open{display:block;}
.fg-sheet{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:600px;background:#0d0d0d;border-radius:20px 20px 0 0;max-height:88vh;overflow-y:auto;z-index:201;display:none;}
.fg-sheet.open{display:block;}
.fg-drag{width:36px;height:4px;background:#333;border-radius:2px;margin:0.75rem auto 0;}
.fg-header{display:flex;align-items:center;justify-content:space-between;padding:0.7rem 1rem 0.5rem;}
.fg-header-title{font-size:0.78rem;font-weight:800;color:#fff;}
.fg-close{background:none;border:none;color:#666;font-size:1.2rem;cursor:pointer;line-height:1;}
.fg-close:hover{color:#fff;}
.fg-section{padding:0.5rem 1rem 0.8rem;border-top:1px solid #111;}
.fg-section-label{font-size:0.58rem;font-weight:800;letter-spacing:0.12em;text-transform:uppercase;color:var(--m);margin-bottom:0.35rem;}
.fg-ta-wrap{display:flex;gap:0.4rem;align-items:flex-start;}
textarea.fg-ta{flex:1;background:#161616;border:1px solid #222;color:#ccc;padding:0.5rem 0.6rem;border-radius:6px;font-size:0.79rem;line-height:1.55;resize:vertical;min-height:80px;font-family:inherit;outline:none;}
textarea.fg-ta:focus{border-color:#333;}
textarea.fg-ta.sm{min-height:52px;}
.fg-save-wrap{padding:0.75rem 1rem 1.5rem;}
.fg-save-btn{width:100%;background:var(--m);color:#fff;border:none;padding:0.7rem;border-radius:10px;font-weight:800;font-size:0.85rem;cursor:pointer;}
.fg-save-btn:disabled{opacity:0.45;}
.fg-save-msg{font-size:0.7rem;text-align:center;margin-top:0.4rem;min-height:1rem;color:#4caf50;}
.fg-save-msg.err{color:#ff6b6b;}

.vm-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.93);z-index:9999;display:flex;align-items:center;justify-content:center;padding:1rem;}
.vm-wrap{position:relative;width:min(380px,88vw);}
.vm-close{position:absolute;top:-42px;right:0;background:none;border:none;color:#fff;font-size:1.8rem;cursor:pointer;line-height:1;padding:0.2rem 0.5rem;}

.ed-section{display:flex;align-items:center;gap:0.75rem;padding:1.25rem 1.25rem 0.65rem;}
.ed-section-text{font-size:0.7rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:#888;white-space:nowrap;}

.ed-scroll{display:flex;gap:0.85rem;overflow-x:auto;padding:0 1.25rem 1.5rem;scrollbar-width:none;-webkit-overflow-scrolling:touch;}
.ed-scroll::-webkit-scrollbar{display:none;}
.guide-card{flex-shrink:0;width:150px;border-radius:16px;overflow:hidden;cursor:pointer;border:1px solid var(--border);transition:transform 0.18s ease;-webkit-user-select:none;user-select:none;}

.guide-card-top{width:150px;height:130px;background:#141414;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0.4rem;}
.guide-card-emoji{font-size:2.8rem;line-height:1;}
.guide-card-count{font-size:0.62rem;font-weight:700;color:#555;letter-spacing:0.05em;}
.guide-card-label{background:var(--m);padding:0.55rem 0.65rem;font-size:0.68rem;font-weight:700;color:#fff;text-align:center;letter-spacing:0.04em;line-height:1.3;}

/* ── SHOOTING CHECKLIST (editor home) ── */
.scene-group{border-top:1px solid var(--border);}
.scene-group-title{font-size:0.72rem;font-weight:800;color:var(--m);text-transform:uppercase;letter-spacing:0.08em;padding:0.75rem 1.25rem 0.35rem;}
.scene-check-row{display:flex;align-items:flex-start;gap:0.75rem;padding:0.55rem 1.25rem;border-bottom:1px solid #111;}
.scene-check-row:last-child{border-bottom:none;margin-bottom:0.3rem;}
.scene-check{width:22px;height:22px;min-width:22px;border:2px solid var(--m);border-radius:5px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background 0.15s;flex-shrink:0;margin-top:0.1rem;}

.scene-check.checked::after{content:'✓';color:#fff;font-size:12px;font-weight:800;}
.scene-check-text{font-size:0.8rem;color:#bbb;line-height:1.4;flex:1;}
.shot-del-btn{background:none;border:none;color:#444;font-size:0.9rem;cursor:pointer;padding:0;min-width:22px;min-height:22px;flex-shrink:0;display:flex;align-items:center;justify-content:center;margin-top:0.05rem;}
.shot-del-btn:hover{color:#ff4444;}
.gs-filter-bar{display:flex;gap:0.35rem;padding:0.5rem 1.25rem 0.75rem;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch;}
.gs-filter-bar::-webkit-scrollbar{display:none;}
.gs-filter-btn{padding:0.35rem 0.75rem;border-radius:20px;border:1px solid #222;background:#0d0d0d;color:#666;font-size:0.68rem;font-weight:700;cursor:pointer;white-space:nowrap;transition:all 0.15s;flex-shrink:0;}
.gs-filter-btn.active{border-color:var(--m);color:var(--m);background:rgba(255,0,170,0.08);}
.gs-filter-btn:hover{border-color:#444;color:#aaa;}
.shot-src-count{font-size:0.6rem;color:#444;font-weight:600;display:block;margin-top:0.12rem;}
.shot-prog-bar{height:3px;background:#1e1e1e;border-radius:2px;margin:0 1.25rem 0.3rem;}
.shot-prog-fill{height:100%;background:var(--m);border-radius:2px;transition:width 0.3s;}
.shot-prog-label{font-size:0.6rem;font-weight:700;color:#555;padding:0 1.25rem 0.6rem;display:flex;justify-content:space-between;}

/* ── CONCEPT FILTER + BIG GRID ── */
.concept-filter-pills{display:flex;gap:6px;padding:0.5rem 1.25rem 0.75rem;flex-wrap:wrap;}
.concept-filter-pill{font-size:0.62rem;font-weight:700;padding:0.3rem 0.8rem;border-radius:20px;background:#111;color:#555;border:1px solid #222;cursor:pointer;transition:all 0.15s;white-space:nowrap;}
.concept-filter-pill.active{background:var(--m);color:#fff;border-color:var(--m);}
.concept-grid-big{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;padding:0 1.25rem 1.5rem;}
.concept-card-big{background:#0d0d0d;border-radius:12px;border:1px solid var(--border);overflow:hidden;cursor:pointer;transition:transform 0.15s;}
.concept-card-big:active{transform:scale(0.97);}
.concept-card-big-thumb{width:100%;aspect-ratio:9/16;max-height:280px;background:#0a0a0a;overflow:hidden;position:relative;display:flex;align-items:center;justify-content:center;}
.concept-card-big-thumb .video-embed-wrap{border:none!important;width:100%;height:100%;position:absolute;top:0;left:0;}
.concept-card-big-thumb .video-embed-wrap.tiktok-wrap iframe,.concept-card-big-thumb .video-embed-wrap.instagram-wrap iframe{width:325px!important;height:580px!important;aspect-ratio:unset!important;max-height:none!important;transform:scale(0.62);transform-origin:top left;}
.concept-card-big-badges{position:absolute;top:8px;left:8px;display:flex;flex-direction:column;gap:4px;z-index:2;}
.concept-card-big-badge{font-size:0.5rem;font-weight:800;padding:0.18rem 0.5rem;border-radius:6px;letter-spacing:0.04em;}
.concept-card-big-badge.badge-platform{background:rgba(17,17,17,0.85);color:#fff;}
.concept-card-big-badge.badge-category{background:rgba(255,0,170,0.85);color:#fff;}
.concept-card-big-outlier{position:absolute;top:8px;right:8px;background:rgba(76,175,80,0.9);color:#fff;font-size:0.62rem;font-weight:800;padding:0.2rem 0.55rem;border-radius:6px;z-index:2;}
.concept-card-big-info{padding:0.55rem 0.65rem;}
.concept-card-big-title{font-size:0.72rem;font-weight:700;color:#ccc;line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.concept-card-big-tags{display:flex;gap:4px;flex-wrap:wrap;margin-top:0.35rem;}
.concept-card-big-tag{font-size:0.48rem;font-weight:600;padding:0.1rem 0.4rem;border-radius:8px;}

var edGSFilter = null;
function renderEdGroupShots(groupLabel) {
  var group = GS_GROUPS.find(function(g){ return g.label === groupLabel; });
  if (!group) { renderEditorHome(); return; }
  var GROUP_EMOJIS = {'Celebrity':'🎬','People':'👥','Products':'🧃','Locations':'📍','Props & B-roll':'🎈'};
  var emoji = GROUP_EMOJIS[groupLabel] || '📋';
  var filterKeys = group.items.map(function(p){ return p.key; });
  var activeFilter = edGSFilter;
  if (activeFilter && filterKeys.indexOf(activeFilter) === -1) activeFilter = null;
  var allShots = GENERAL_SHOTS.filter(function(gs){ return filterKeys.indexOf(gs.person) !== -1; });
  var filteredShots = activeFilter ? allShots.filter(function(gs){ return gs.person === activeFilter; }) : allShots;
  var totalAll = allShots.length;
  var doneAll = allShots.filter(function(gs){ return doneGS.has(gs.id); }).length;

  var html = '<div class="scene-group-title" style="font-size:1.1rem;padding:1rem 1.25rem 0.2rem;">'+emoji+' '+esc(groupLabel)+'</div>'
    +'<div id="gs-counter" data-group="'+esc(groupLabel)+'" style="padding:0 1.25rem 0.5rem;color:#888;font-size:0.75rem;">'+doneAll+' of '+totalAll+' shots completed</div>';

  if (group.items.length > 1) {
    html += '<div class="gs-filter-bar">';
    html += '<button class="gs-filter-btn'+(activeFilter===null?' active':'')+'" onclick="edGSFilter=null;renderEdGroupShots(\''+groupLabel.replace(/'/g,"\\'")+'\')">All</button>';
    group.items.forEach(function(p) {
      html += '<button class="gs-filter-btn'+(activeFilter===p.key?' active':'')+'" onclick="edGSFilter=\''+p.key.replace(/'/g,"\\'")+'\';renderEdGroupShots(\''+groupLabel.replace(/'/g,"\\'")+'\')">'+p.emoji+' '+esc(p.short)+'</button>';
    });
    html += '</div>';
  }

  var currentPerson = null;
  filteredShots.forEach(function(gs) {
    if (gs.person !== currentPerson) {
      currentPerson = gs.person;
      var item = group.items.find(function(p){ return p.key === gs.person; });
      var pEmoji = item ? item.emoji : '';
      var pDone = allShots.filter(function(s){ return s.person === gs.person && doneGS.has(s.id); }).length;
      var pTotal = allShots.filter(function(s){ return s.person === gs.person; }).length;
      html += '<div style="padding:0.6rem 1.25rem 0.25rem;display:flex;align-items:center;justify-content:space-between;">'
        +'<div style="font-size:0.68rem;font-weight:800;color:var(--m);text-transform:uppercase;letter-spacing:0.08em;">'+pEmoji+' '+esc(gs.person)+'</div>'
        +'<div style="font-size:0.58rem;color:#555;font-weight:700;">'+pDone+'/'+pTotal+'</div>'
        +'</div>';
    }
    var isDone = doneGS.has(gs.id);
    html += '<div class="scene-check-row">'
      +'<div class="scene-check'+(isDone?' checked':'')+'" data-gs-id="'+esc(gs.id)+'" onclick="toggleGSEl(this)"></div>'
      +'<div class="scene-check-text"><strong>'+esc(gs.label)+'</strong>'
      +(gs.detail ? '<div style="font-size:0.7rem;color:#777;margin-top:0.15rem;">'+esc(gs.detail)+'</div>' : '')
      +'</div></div>';
  });

  html += '<div style="padding:1rem 1.25rem;"><button onclick="renderEditorHome()" style="background:none;border:1px solid #333;color:#888;padding:0.45rem 1rem;border-radius:8px;font-size:0.72rem;font-weight:700;cursor:pointer;">← Back</button></div>';
  document.getElementById('editor-home').innerHTML = html;

function getAllTags(cat) {
  var base = TAG_CATEGORIES[cat] || [];
  var custom = customTags[cat] || [];
  return base.concat(custom.filter(function(t){ return base.indexOf(t) === -1; }));
}
function getAllTagsFlat() {
  var all = [];
  Object.keys(TAG_CATEGORIES).forEach(function(cat){ getAllTags(cat).forEach(function(t){ if(all.indexOf(t)===-1) all.push(t); }); });
  return all;
}
async function loadCustomTags() {
  try {
    var r = await db.from('settings').select('value').eq('key', CUSTOM_TAGS_KEY).maybeSingle();
    if (r.data && r.data.value) customTags = JSON.parse(r.data.value);
  } catch(e) {}
}
async function saveCustomTags() {
  try { await db.from('settings').upsert({ key: CUSTOM_TAGS_KEY, value: JSON.stringify(customTags) }); } catch(e) {}
}
function addNewTag(cat, tag) {
  tag = tag.trim();
  if (!tag) return;
  if (getAllTags(cat).indexOf(tag) !== -1) return;
  if (!customTags[cat]) customTags[cat] = [];
  customTags[cat].push(tag);
  saveCustomTags();
}
function removeCustomTag(cat, tag) {
  if (!customTags[cat]) return;
  var i = customTags[cat].indexOf(tag);
  if (i !== -1) customTags[cat].splice(i, 1);
  saveCustomTags();
}

      +'<button style="background:#222;color:#888;" id="pm-cancel">Cancel</button>'
      +'<button style="background:var(--m);color:#fff;" id="pm-save">Save</button>'
    +'</div></div>';
  document.body.appendChild(o);
  o.querySelector('#pm-cancel').onclick = function(){ o.remove(); };

  o.querySelector('#pm-save').onclick = function(){

      editor: document.getElementById('pm-editor').value.trim(),

  o.onclick = function(e){ if(e.target===o) o.remove(); };

function renderEdCategoryShots(catId, filter) {
  var cat = CATEGORIES.find(function(c){ return c.id === catId; });
  if (!cat) return '';
  var group = GS_GROUPS.find(function(g){ return g.label === cat.label; });
  if (!group || !group.items || !group.items.length) {
    return '<div style="padding:2rem 1.25rem;text-align:center;color:#333;">'
      +'<div style="font-size:2rem;margin-bottom:0.6rem;">📋</div>'
      +'<div style="font-size:0.78rem;font-weight:700;">No shots defined for this category</div></div>';
  }
  var filterKeys = group.items.map(function(p){ return p.key; });
  var allShots = GENERAL_SHOTS.filter(function(gs){ return filterKeys.indexOf(gs.person) !== -1; });
  var filteredShots = filter ? allShots.filter(function(gs){ return gs.person === filter; }) : allShots;
  var doneCount = allShots.filter(function(gs){ return doneGS.has(gs.id); }).length;
  var pct = allShots.length ? Math.round(doneCount * 100 / allShots.length) : 0;

  var html = '';
  if (group.items.length > 1) {
    html += '<div class="shot-filter-pills">';
    html += '<div class="shot-filter-pill'+(filter===null?' active':'')+'" onclick="edCatShotFilter=null;renderEdCategoryDetail(\''+catId+'\',\'shots\')">All ('+allShots.length+')</div>';
    group.items.forEach(function(p) {
      var pCount = allShots.filter(function(gs){ return gs.person === p.key; }).length;
      html += '<div class="shot-filter-pill'+(filter===p.key?' active':'')+'" onclick="edCatShotFilter=\''+p.key.replace(/'/g,"\\'")+'\';renderEdCategoryDetail(\''+catId+'\',\'shots\')">'+esc(p.short)+' ('+pCount+')</div>';
    });
    html += '</div>';
  }
  html += '<div class="shot-progress-bar">'
    +'<div class="shot-progress-text"><span style="color:#ccc;">Progress</span><span style="color:#4caf50;font-weight:700;">'+doneCount+' / '+allShots.length+'</span></div>'
    +'<div class="shot-progress-track"><div class="shot-progress-fill" style="width:'+pct+'%;"></div></div>'
    +'</div>';

  // Rich shot cards with inline editing
  filteredShots.forEach(function(gs, idx) {
    var isDone = doneGS.has(gs.id);
    var sid = gs.id.replace(/'/g, "\\'");
    var shotNum = idx + 1;

    // Find connected videos
    var connectedVids = (gs.videoTitles||[]).map(function(title) {
      var found = null; var conceptNum = 0;
      var allVids = Object.keys(savedVid).map(function(k){ return savedVid[k]; }).filter(Boolean);
      allVids.forEach(function(v, vi) {
        if (v.title === title) { found = v; conceptNum = vi + 1; }
      });
      if (!found) return null;
      return { title: title, url: found.url, num: conceptNum };
    }).filter(Boolean);

    html += '<div class="shot-card-rich'+(isDone?' done-card':'')+'">';

    // Header
    html += '<div class="shot-card-header">'
      +'<div class="shot-card-check'+(isDone?' done':'')+'" data-gs-id="'+esc(gs.id)+'" onclick="toggleGSEl(this);renderEdCategoryDetail(\''+catId+'\',\'shots\')"></div>'
      +'<div class="shot-card-num'+(isDone?' done-num':'')+'">'+shotNum+'</div>'
      +'<div class="shot-card-hinfo">'
        +'<div class="shot-card-label'+(isDone?' done-label':'')+'">'+esc(gs.label)+'</div>'
        +(gs.detail ? '<div class="shot-card-framing">'+esc(gs.detail)+'</div>' : '')
      +'</div>'
      +'<select class="shot-ed-select" onchange="updateShotField(\''+sid+'\',\'shotType\',this.value)">'
        +'<option value=""'+((!gs.shotType)?' selected':'')+'>Type</option>'
        +'<option value="video"'+((gs.shotType==='video')?' selected':'')+'>Video</option>'
        +'<option value="photo"'+((gs.shotType==='photo')?' selected':'')+'>Photo</option>'
        +'<option value="still"'+((gs.shotType==='still')?' selected':'')+'>Still</option>'
      +'</select>'
      +'</div>';

    // Body: details left, refs right
    html += '<div class="shot-card-body">';

    // Left: editable on-set details
    html += '<div class="shot-card-details">';

    html += '<div class="shot-field-group"><div class="shot-field-label">Props / setup</div>'
      +'<input class="shot-ed-input" placeholder="e.g. Lem, seamless backdrop" value="'+esc(gs.propStation||'')+'" onblur="updateShotField(\''+sid+'\',\'propStation\',this.value)">'
      +'</div>';

    html += '<div class="shot-field-group"><div class="shot-field-label">On set</div>'
      +'<div class="shot-onset-grid">'
        +'<div><div class="shot-onset-item-label">Videographer</div><input class="shot-ed-input" placeholder="Who films" value="'+esc(gs.videographer||'')+'" onblur="updateShotField(\''+sid+'\',\'videographer\',this.value)"></div>'
        +'<div><div class="shot-onset-item-label">Talent</div><input class="shot-ed-input" placeholder="Who appears" value="'+esc(gs.talent||'')+'" onblur="updateShotField(\''+sid+'\',\'talent\',this.value)"></div>'
      +'</div></div>';

    html += '<div class="shot-field-group"><div class="shot-field-label">Edit recipe</div>'
      +'<textarea class="shot-ed-textarea" placeholder="How the editor should handle this footage" onblur="updateShotField(\''+sid+'\',\'editRecipe\',this.value)">'+esc(gs.editRecipe||'')+'</textarea>'
      +'</div>';

    html += '<div class="shot-field-group"><div class="shot-field-label">Director note</div>'
      +'<textarea class="shot-ed-textarea" placeholder="Special instructions for this shot" onblur="updateShotField(\''+sid+'\',\'directorNote\',this.value)">'+esc(gs.directorNote||'')+'</textarea>'
      +'</div>';

    html += '</div>';

    // Right: reference videos
    html += '<div class="shot-card-refs">'
      +'<div class="shot-field-label">Reference videos</div>';
    if (connectedVids.length) {
      connectedVids.forEach(function(cv) {
        var thumbEmbed = buildEmbed(cv.url) || '';
        html += '<div class="shot-ref-vid">'
          +'<div class="shot-ref-thumb">'+(thumbEmbed || '<div class="shot-ref-play"></div>')+'</div>'
          +'<div class="shot-ref-info">'
            +'<div class="shot-ref-num">C'+cv.num+'</div>'
            +'<div class="shot-ref-title">'+esc(cv.title)+'</div>'
          +'</div>'
          +'</div>';
      });
    } else {
      html += '<div class="shot-empty-details">No videos linked</div>';
    }
    html += '</div>';

    html += '</div>';
    html += '</div>';
  });

  return html;
}

async function doLogin() {
  var email = document.getElementById('g-email').value.trim();
  var pw    = document.getElementById('g-pw').value;
  var err   = document.getElementById('g-err');
  var btn   = document.getElementById('g-btn');
  if (!email || !pw) { err.textContent = 'Enter email and password.'; return; }
  btn.disabled = true; btn.textContent = 'Signing in…'; err.textContent = '';
  try {
    var res = await db.auth.signInWithPassword({ email, password: pw });
    if (res.error) throw res.error;
    startEditor();
  } catch(e) {
    err.textContent = e.message || 'Sign in failed.';
    btn.disabled = false; btn.textContent = 'Sign In';
  }
}

// ── LOAD FROM SUPABASE ──
async function loadSaved() {
  try {
    var r = await db.from('settings').select('value').eq('key', FG_KEY).maybeSingle();
    if (r.data && r.data.value) savedFG = JSON.parse(r.data.value);
  } catch(e) {}
  try {
    var r2 = await db.from('settings').select('value').eq('key', VID_KEY).maybeSingle();
    if (r2.data && r2.data.value) {
      var p = JSON.parse(r2.data.value);
      if (p.guides) {
        // Migrate old guide IDs to new category IDs
        loadedGuides = CATEGORIES.map(function(c) {
          return { id: c.id, label: c.label, emoji: c.emoji, subtitle: '', count: 0, peak: '' };
        });
        var idx = 0;
        VIDEOS = [];
        p.guides.forEach(function(g) {
          var newId = GUIDE_MIGRATION_MAP[g.id];
          if (newId === undefined) newId = g.id;
          if (newId === null) return;
          (g.videos||[]).forEach(function(v) {
            VIDEOS.push({ idx: idx, url: v.url, title: v.title||'', score: v.outlierScore||'', guideId: newId });
            savedVid[idx] = Object.assign({}, v, { guideId: newId });
            idx++;
          });
        });
        loadedGuides.forEach(function(lg) {
          lg.count = VIDEOS.filter(function(v){ return v.guideId === lg.id; }).length;
        });
      }
    }
  } catch(e) {}
}

function prefillShotDefaults() {
  var changed = false;
  GENERAL_SHOTS.forEach(function(gs) {
    if (gs.videographer || gs.talent || gs.editRecipe || gs.directorNote) return;
    changed = true;

    // Assign videographer based on person/category
    var person = gs.person || '';
    if (/Lem|Avo|BeRRi|Blanket|Snack|Trio/.test(person)) {
      gs.videographer = 'Susan';
      gs.talent = 'Product only';
      gs.shotType = gs.shotType || 'video';
      if (/macro|close/i.test(gs.label)) {
        gs.propStation = person + ', seamless backdrop, ring light';
        gs.editRecipe = 'Slow-motion macro. Cut tight on texture and detail. Trending audio, 9:16.';
        gs.directorNote = 'Fill the frame. No distracting background.';
      } else if (/in-use|applying/i.test(gs.label)) {
        gs.talent = 'Crystal or model';
        gs.propStation = person + ', mirror, good lighting';
        gs.editRecipe = 'Tutorial style — show application step by step. Split-screen before/after if possible. 9:16.';
        gs.directorNote = 'Hands must be clean, nails done. Natural light preferred.';
      } else {
        gs.propStation = person + ', styled surface, props';
        gs.editRecipe = 'Lifestyle B-roll. Cut between angles. Ambient audio or trending sound. 9:16.';
        gs.directorNote = 'Make it look editorial. Think magazine flat lay.';
      }
    } else if (/Nick/i.test(person)) {
      gs.videographer = 'Jackie';
      gs.talent = 'Nick Kyrgios';
      gs.shotType = gs.shotType || 'video';
      gs.propStation = 'Court, racquet, Nancy merch';
      if (/serve|rally|action/i.test(gs.label)) {
        gs.editRecipe = 'Slow-mo action cuts. Wide → medium → close-up sequence. Hype audio. 9:16.';
        gs.directorNote = 'Capture genuine intensity. No posing — catch real moments.';
      } else if (/reaction|candid|crowd/i.test(gs.label)) {
        gs.editRecipe = 'Quick cuts of genuine reactions. Trending reaction audio. 9:16.';
        gs.directorNote = 'Stay close, be invisible. Candid > posed.';
      } else {
        gs.editRecipe = 'Portrait style. Clean background. Natural light. 9:16.';
        gs.directorNote = 'Get eye contact. One great frame > ten average ones.';
      }
    } else if (/Inflatable|Giant|Tennis Ball/i.test(person)) {
      gs.videographer = 'Jackie';
      gs.talent = 'Crowd + passersby';
      gs.shotType = gs.shotType || 'video';
      gs.propStation = person + ', court, merch';
      gs.editRecipe = 'Wide establishing → crowd reactions → product macro → wide crowd. Trending "look at this" audio · bold location text · 9:16.';
      gs.directorNote = 'Spectacle = shares. Lead with the prop in one wide frame. Grab a still for the grid.';
    } else if (/Covent|London|Mandrake|Paddle|venue/i.test(person)) {
      gs.videographer = 'Susan';
      gs.talent = 'Crowd + passersby';
      gs.shotType = gs.shotType || 'video';
      gs.propStation = 'Nancy truck, signage, queue barriers';
      gs.editRecipe = 'Establishing → queue energy → product moment → crowd wide. Location text overlay. 9:16.';

// ── EMBED BUILDER ──
function buildEmbed(url) {
  if (!url) return '<div style="width:100%;height:100%;background:#111;display:flex;align-items:center;justify-content:center;color:#333;">▶</div>';
  if (/tiktok\.com/.test(url)) {
    var m = url.match(/\/video\/(\d+)/);
    if (m) return '<div class="video-embed-wrap tiktok-wrap"><iframe src="https://www.tiktok.com/embed/v2/'+m[1]+'" allow="fullscreen" sandbox="allow-scripts allow-same-origin allow-popups" loading="lazy"></iframe></div>';
  }
  if (/instagram\.com/.test(url)) {
    var m2 = url.match(/\/(p|reel)\/([A-Za-z0-9_-]+)/);
    if (m2) return '<div class="video-embed-wrap instagram-wrap"><iframe src="https://www.instagram.com/'+m2[1]+'/'+m2[2]+'/embed/" allow="autoplay;clipboard-write;encrypted-media;picture-in-picture;web-share" allowfullscreen loading="lazy" scrolling="no"></iframe></div>';
  }
  if (/facebook\.com|fb\.watch/.test(url)) {
    return '<div class="video-embed-wrap facebook-wrap"><iframe src="https://www.facebook.com/plugins/video.php?href='+encodeURIComponent(url)+'&show_text=false" allow="autoplay;clipboard-write;encrypted-media;picture-in-picture;web-share" allowfullscreen loading="lazy" scrolling="no"></iframe></div>';
  }
  if (/x\.com|twitter\.com/.test(url)) {
    var tm = url.match(/\/status\/(\d+)/);
    if (tm) return '<div class="video-embed-wrap twitter-wrap"><iframe src="https://platform.twitter.com/embed/Tweet.html?id='+tm[1]+'&theme=dark&dnt=true" allow="autoplay;clipboard-write;encrypted-media;picture-in-picture" loading="lazy" scrolling="no"></iframe></div>';
  }
  return '<div style="width:100%;height:100%;background:#111;display:flex;align-items:center;justify-content:center;color:var(--m);">▶</div>';
}

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ── VIDEO EXPAND MODAL ──
function openVideoModal(url) {
  var ex = document.getElementById('vm-overlay');
  if (ex) ex.remove();
  var overlay = document.createElement('div');
  overlay.id = 'vm-overlay';
  overlay.className = 'vm-overlay';
  var wrap = document.createElement('div');
  wrap.className = 'vm-wrap';
  var closeBtn = document.createElement('button');
  closeBtn.className = 'vm-close';
  closeBtn.textContent = '✕';
  closeBtn.addEventListener('click', function() { overlay.remove(); });
  wrap.innerHTML = buildEmbed(url);
  wrap.insertBefore(closeBtn, wrap.firstChild);
  overlay.appendChild(wrap);
  overlay.addEventListener('click', function(e) { if (e.target === overlay) overlay.remove(); });
  document.body.appendChild(overlay);
}

// ── TAGS ──
function toggleTag(pill, idx, tag) {
  pill.classList.toggle('on');
  var sv = savedVid[idx] || {};
  var tags = (sv.tags || []).slice();
  var i = tags.indexOf(tag);
  if (i === -1) tags.push(tag); else tags.splice(i, 1);
  savedVid[idx] = Object.assign(sv, { tags: tags });
  persistVids();
}

function addTagFromUI(idx) {
  var input = document.getElementById('newtag-' + idx);
  var select = document.getElementById('newtagcat-' + idx);
  var tag = (input.value || '').trim();
  var cat = select.value;
  if (!tag) return;
  addNewTag(cat, tag);
  var sv = savedVid[idx] || {};
  var tags = (sv.tags || []).slice();
  if (tags.indexOf(tag) === -1) tags.push(tag);
  savedVid[idx] = Object.assign(sv, { tags: tags });
  persistVids();
  renderVideos(CURRENT_GUIDE);
}

function removeTagFromSystem(cat, tag, idx) {
  if (!confirm('Remove "' + tag + '" from all videos?')) return;
  removeCustomTag(cat, tag);
  Object.keys(savedVid).forEach(function(k) {
    var sv = savedVid[k];
    if (sv && sv.tags) {
      var i = sv.tags.indexOf(tag);
      if (i !== -1) sv.tags.splice(i, 1);
    }
  });
  persistVids();
  renderVideos(CURRENT_GUIDE);
}

function setStatus(idx, newStatus) {
  var sv = savedVid[idx] || { url: VIDEOS[idx].url, title: VIDEOS[idx].title };
  savedVid[idx] = Object.assign(sv, { status: newStatus });
  persistVids().then(function() { renderVideos(CURRENT_GUIDE); });
}

async function persistVids() {
  var guideMap = {};
  VIDEOS.forEach(function(vi) {
    var d = savedVid[vi.idx] || { url: vi.url, title: vi.title, outlierScore: vi.score };
    var gid = d.guideId || vi.guideId || 'celebrity-sports';
    if (!guideMap[gid]) guideMap[gid] = [];
    guideMap[gid].push(d);
  });
  var guides = Object.keys(guideMap).map(function(gid) {
    var meta = loadedGuides.find(function(g){ return g.id === gid; })
            || GUIDES_LIST.find(function(g){ return g.id === gid; })
            || { id: gid };
    return { id: gid, label: meta.label, emoji: meta.emoji, subtitle: meta.subtitle, count: guideMap[gid].length, peak: meta.peak, videos: guideMap[gid] };
  });
  try {
    await db.from('settings').upsert({ key: VID_KEY, value: JSON.stringify({ guides: guides }) });
  } catch(e) {}
}

    });
    if (changed) {
      try { await db.from('settings').upsert({ key: SHOTS_CONFIG_KEY, value: JSON.stringify({ shots: GENERAL_SHOTS, groups: GS_GROUPS, schedule: PEOPLE_SCHEDULE, shootSchedule: SHOOT_BLOCKS, pipeline: PIPELINE }) }); } catch(e) {}
    }
  }

  btn.disabled = false; btn.textContent = 'Save';
}

// ── VOICE INPUT ──
var activeRec = null;
var activeMicEl = null;

function clearField(fieldId) {
  if (activeMicEl && activeMicEl.getAttribute('data-field') === fieldId) {
    if (activeRec) { activeRec.stop(); activeRec = null; }
    activeMicEl.classList.remove('on');
    activeMicEl.textContent = activeMicEl.textContent.replace('⏹','🎤');
    activeMicEl = null;
  }
  var ta = document.getElementById(fieldId);
  if (ta) { ta.value = ''; ta.focus(); }
}

function toggleMic(btn, fieldId) {
  var wasThisBtn = (activeMicEl === btn);
  if (activeRec) {
    activeRec.stop();
    activeRec = null;
    if (activeMicEl) { activeMicEl.classList.remove('on'); activeMicEl.textContent = activeMicEl.textContent.replace('⏹','🎤'); }
    activeMicEl = null;
  }
  if (wasThisBtn) return;

  var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { alert('Voice input requires Chrome browser.'); return; }

  var ta = document.getElementById(fieldId);
  if (!ta) return;
  var baseline = ta.value ? ta.value.trimEnd() + ' ' : '';

  var r = new SR();
  r.continuous = true;
  r.interimResults = true;
  r.lang = 'en-US';

  r.onresult = function(e) {
    var out = '';
    for (var i = 0; i < e.results.length; i++) out += e.results[i][0].transcript;
    ta.value = baseline + out;
    ta.scrollTop = ta.scrollHeight;
  };
  r.onerror = r.onend = function() {
    if (activeRec === r) {
      btn.classList.remove('on');
      btn.textContent = btn.textContent.replace('⏹','🎤');
      activeRec = null; activeMicEl = null;
    }
  };

  activeRec = r; activeMicEl = btn;
  btn.classList.add('on');
  btn.textContent = btn.textContent.replace('🎤','⏹');
  r.start();
}

// ── BOOT ──
(async function() {
  var res = await db.auth.getSession();
  if (res.data && res.data.session) startEditor();
})();
</script>
