function showSingleVideo(videoTitle) {
  var video = null; var guideId = null; var videoIdx = 0;
  DATA.guides.forEach(function(g) {
    (g.videos||[]).forEach(function(v, vi) {
      if (v.title === videoTitle) { video = v; guideId = g.id; videoIdx = vi; }
    });
  });
  if (!video) { goHome(); return; }
  var el = document.getElementById('guide-detail-content');
  var uid = guideId + '-' + videoIdx;
  el.innerHTML = '<div style="padding:0.5rem 1.25rem;"><button class="home-btn" onclick="goHome()" style="padding:0;">← Back</button></div>'
    + '<div class="guide-cat-label" style="font-size:0.65rem;">Concept '+(videoIdx+1)+'</div>'
    + buildVideoEntry(video, uid, guideId, videoIdx);
  showPage('page-guide');
}

function renderGuide(id) {
  var guide = DATA.guides.find(function(g){ return g.id === id; });
  if (!guide) { goHome(); return; }

  var el = document.getElementById('guide-detail-content');
  el.setAttribute('data-guide-id', id);

  var catLabel = guide.subtitle ? guide.label+' — '+guide.subtitle : guide.label;

  // Only show approved videos (no status field = legacy approved)
  var approved = (guide.videos || []).filter(function(v){
    return !v.status || v.status === 'approved';
  });

  // Tag filter pills — only show tags that exist on at least one approved video
  var usedTags = ALL_TAGS.filter(function(t){
    return approved.some(function(v){ return (v.tags||[]).indexOf(t) !== -1; });
  });

  var tagFilterHTML = usedTags.length > 0
    ? '<div class="guide-tag-filter">'
        + '<button class="tag-filter-pill'+(activeVideoTag===null?' active':'')+'" onclick="setVideoTagFilter(null)">All</button>'
        + usedTags.map(function(t){
            return '<button class="tag-filter-pill'+(activeVideoTag===t?' active':'')+'" onclick="setVideoTagFilter(\''+t.replace(/'/g,"\\'")+'\')">'+ t +'</button>';
          }).join('')
        + '</div>'
    : '';

  // Apply active tag filter
  var visible = activeVideoTag
    ? approved.filter(function(v){ return (v.tags||[]).indexOf(activeVideoTag) !== -1; })
    : approved;

  var videosHTML;
  if (visible.length === 0) {
    videosHTML = '<div class="empty-state">No videos match this filter.</div>';
  } else {
    videosHTML = visible.map(function(video, idx){
      var realIdx = (guide.videos || []).indexOf(video);
      return buildVideoEntry(video, id+'-'+realIdx, id, realIdx);
    }).join('');
  }

  el.innerHTML =
    '<div style="padding:0.5rem 1.25rem;"><button class="home-btn" onclick="goHome()" style="padding:0;">← Back</button></div>'
    +'<div class="guide-cat-label">'+esc(catLabel)+'</div>'
    +tagFilterHTML
    +videosHTML;
}

function buildVideoEntry(video, uid, guideId, videoIdx) {
  var embedInner = buildVideoEmbed(video.url || null) || '<div class="ve-embed-placeholder"><div class="ve-play"></div></div>';

  // Stats pills
  var statsHTML = [
    video.outlierScore ? '<span class="vev2-stat s-score">'+esc(video.outlierScore)+'</span>' : '',
    video.views        ? '<span class="vev2-stat s-views">'+esc(video.views)+' views</span>' : '',
    video.likes        ? '<span class="vev2-stat s-likes">'+esc(video.likes)+' likes</span>' : '',
    video.hookPattern  ? '<span class="vev2-stat s-hook">🪝 '+esc(video.hookPattern)+'</span>' : ''
  ].filter(Boolean).join('');

  // Tags (coloured by category)
  var vtags = Array.isArray(video.tags) ? video.tags : [];
  var tagsHTML = vtags.map(function(t) {
    var cat = Object.keys(TAG_CATEGORIES).find(function(c){ return getAllTags(c).indexOf(t) !== -1; }) || 'other';
    return '<span class="vev2-tag" data-cat="'+cat+'">'+esc(t)+'</span>';
  }).join('');

  // Shot list builder
  function shots(arr) {
    if (!Array.isArray(arr) || !arr.length) return '';
    return arr.map(function(s){ return '<div class="vev2-shot">'+esc(s)+'</div>'; }).join('');
  }

  // Original column
  var origHTML = '';
  if (video.deepAnalysis) {
    var da = video.deepAnalysis;
    var shotSplit = da.split(/\s*(Shot\s+\d+\s*:?)\s*/i);
    if (shotSplit.length > 1) {
      var analysisPart = shotSplit[0].replace(/\s*shot\s*breakdown\s*:?\s*$/i,'').trim();
      if (analysisPart) origHTML += '<div class="vev2-slbl">Analysis</div><div class="vev2-txt">'+esc(analysisPart)+'</div>';
      var origShots = [];
      for (var si = 1; si < shotSplit.length; si += 2) {
        var shotLabel = (shotSplit[si]||'').trim();
        var shotBody = (shotSplit[si+1]||'').trim();
        if (shotLabel || shotBody) origShots.push(shotLabel + ' ' + shotBody);
      }
      if (origShots.length) origHTML += '<div class="vev2-slbl">Shot Breakdown</div>' + origShots.map(function(s){ return '<div class="vev2-shot">'+esc(s.trim())+'</div>'; }).join('');
    } else {
      origHTML += '<div class="vev2-slbl">Analysis</div><div class="vev2-txt">'+esc(da)+'</div>';
    }
  }
  if (video.shots && video.shots.length) origHTML += '<div class="vev2-slbl">Shot Breakdown</div>'+shots(video.shots);

  // Nancy column
  var nancyHTML = '';
  if (video.nancyExecution) nancyHTML += '<div class="vev2-slbl">Execution</div><div class="vev2-txt">'+esc(video.nancyExecution)+'</div>';
  if (video.productionShots && video.productionShots.length) nancyHTML += '<div class="vev2-slbl">Shot by Shot</div>'+shots(video.productionShots);
  if (video.videographer) nancyHTML += '<hr class="vev2-hr"><div class="vev2-slbl">Videographer</div><div class="vev2-txt">'+esc(video.videographer)+'</div>';
  if (video.peopleInstructions) nancyHTML += '<div class="vev2-slbl">People</div><div class="vev2-txt">'+esc(video.peopleInstructions)+'</div>';
  if (video.postCaption) nancyHTML += '<hr class="vev2-hr"><div class="vev2-slbl">Post Caption</div><div class="vev2-txt">'+esc(video.postCaption)+'</div>';
  if (video.overlayCaption) nancyHTML += '<div class="vev2-slbl">Overlay Caption</div><div class="vev2-txt">'+esc(video.overlayCaption)+'</div>';

  return '<div class="video-entry-v2">'

    // Title + outlier badge
    + '<div class="vev2-hdr">'
    +   '<div class="vev2-title">'+esc(video.title||'Untitled')+'</div>'
    +   (video.outlierScore ? '<div class="vev2-outlier">'+esc(video.outlierScore)+'</div>' : '')
    + '</div>'

    + '<div class="vev2-body">'

    // Left: phone embed + link + stats
    +   '<div class="vev2-left">'
    +     '<div class="vev2-embed" data-url="'+esc(video.url||'')+'">'+embedInner+'</div>'
    +     (video.url ? '<a href="'+esc(video.url)+'" target="_blank" rel="noopener" class="vev2-url">'+esc(video.url)+'</a>' : '')
    +     (statsHTML ? '<div class="vev2-stats">'+statsHTML+'</div>' : '')
    +   '</div>'

    // Right: tags row + Original | Nancy split
    +   '<div class="vev2-right">'
    +     (tagsHTML ? '<div class="vev2-tags">'+tagsHTML+'</div>' : '')
    +     '<div class="vev2-split">'
    +       '<div class="vev2-col"><div class="vev2-col-hdr o">Original</div>'+origHTML+'</div>'
    +       '<div class="vev2-col"><div class="vev2-col-hdr n">Nancy</div>'+nancyHTML+'</div>'
    +     '</div>'
    +   '</div>'

    + '</div>'

    // Shot progress bar
    + (function(){
        var prog = calcVideoProgress(video);
        if (!prog) return '';
        return '<div class="shot-prog-bar"><div class="shot-prog-fill" style="width:'+prog.pct+'%"></div></div>'
          +'<div class="shot-prog-label'+(prog.complete?' all-done':'')+'">'
          +'<span>'+prog.done+' / '+prog.total+' shots done</span>'
          +(prog.complete?'<span class="shot-ready-badge">Ready for Editors ✓</span>':'')
          +'</div>';
      })()

    + '</div>';
}

function openGuideSheet(guideId, videoIdx, type) {
  var guide = DATA.guides.find(function(g){ return g.id === guideId; });
  if (!guide) return;
  var video = guide.videos[videoIdx];
  if (!video) return;

  var typeLabels = { shots:'Shooting Guide', script:'Script Guide', fullGuide:'Full Guide' };
  var label = typeLabels[type] || 'Guide';

  var contentHTML = '';

  if (type === 'shots') {
    var scenes = video.filmingGuide || [];
    if (scenes.length > 0) {
      contentHTML = scenes.map(function(s) {
        return '<div class="gs-scene-row"><div class="gs-scene-time">'+esc(s.time)+'</div><div class="gs-scene-text">'+esc(s.text)+'</div></div>';
      }).join('');
    } else {
      contentHTML = '<div class="gs-no-scenes">Shooting guide coming soon.</div>';
    }
  } else if (type === 'script') {
    var scriptText = (typeof video.script === 'string') ? video.script : '';
    contentHTML = '<div class="gs-script-block">'+(scriptText ? esc(scriptText) : '<span style="color:#333;">Script coming soon.</span>')+'</div>';
  } else if (type === 'all') {
    var scr2 = (typeof video.script === 'string') ? video.script : '';
    if (scr2) {
      contentHTML += '<div class="gs-type-label">Script</div><div class="gs-script-block">'+esc(scr2)+'</div>';
    }
    var scenes2 = video.filmingGuide || [];
    if (scenes2.length) {
      contentHTML += '<div class="gs-type-label">Shooting Guide</div>'
        + scenes2.map(function(s){ return '<div class="gs-scene-row"><div class="gs-scene-time">'+esc(s.time)+'</div><div class="gs-scene-text">'+esc(s.text)+'</div></div>'; }).join('');
    }
    var fgArr2 = FULL_GUIDES[guideId + '-' + videoIdx];
    if (Array.isArray(fgArr2)) {
      contentHTML += fgArr2.map(function(sec) {
        var h = '<div class="gs-type-label">'+esc(sec.head||'')+'</div>';
        if (sec.body)  h += '<div class="gs-fg-body">'+esc(sec.body)+'</div>';
        if (sec.items) h += '<div class="gs-fg-items">'+sec.items.map(function(it){ return '<div class="gs-fg-item">'+esc(it)+'</div>'; }).join('')+'</div>';
        return h;
      }).join('');
    }
    // Fallback: no filmingGuide/script/fullGuide — show available card data
    if (!contentHTML) {
      if (video.deepAnalysis) contentHTML += '<div class="gs-type-label">Original Analysis</div><div class="gs-fg-body">'+esc(video.deepAnalysis)+'</div>';
      if (video.shots && video.shots.length) contentHTML += '<div class="gs-type-label">Original Shots</div><div class="gs-fg-items">'+video.shots.map(function(s){ return '<div class="gs-fg-item">'+esc(s)+'</div>'; }).join('')+'</div>';
      if (video.nancyExecution) contentHTML += '<div class="gs-type-label">Nancy Execution</div><div class="gs-fg-body">'+esc(video.nancyExecution)+'</div>';
      if (video.productionShots && video.productionShots.length) contentHTML += '<div class="gs-type-label">Production Shots</div><div class="gs-fg-items">'+video.productionShots.map(function(s){ return '<div class="gs-fg-item">'+esc(s)+'</div>'; }).join('')+'</div>';
      if (video.peopleInstructions) contentHTML += '<div class="gs-type-label">People</div><div class="gs-fg-body">'+esc(video.peopleInstructions)+'</div>';
      if (video.postCaption) contentHTML += '<div class="gs-type-label">Post Caption</div><div class="gs-fg-body">'+esc(video.postCaption)+'</div>';
    }
  } else {
    var fgArr = FULL_GUIDES[guideId + '-' + videoIdx];
    if (Array.isArray(fgArr) && fgArr.length) {
      contentHTML = fgArr.map(function(sec) {
        var h = '<div class="gs-type-label">'+esc(sec.head||'')+'</div>';
        if (sec.body)  h += '<div class="gs-fg-body">'+esc(sec.body)+'</div>';
        if (sec.items) h += '<div class="gs-fg-items">'+sec.items.map(function(it){ return '<div class="gs-fg-item">'+esc(it)+'</div>'; }).join('')+'</div>';
        return h;
      }).join('');
    } else {
      var fg = video.fullGuide || '';
      contentHTML = '<div class="gs-fg-body">'+(fg ? esc(fg) : '<span style="color:#555;font-style:italic;">Full guide coming soon.</span>')+'</div>';
    }
  }

  var _plt = detectPlatform(video.url || '');
  var _pltLabel = ({youtube:'YouTube',tiktok:'TikTok',instagram:'Instagram',pinterest:'Pinterest'}[_plt]) || 'video';
  var _vidBanner = video.url
    ? '<a href="'+esc(video.url)+'" target="_blank" rel="noopener" style="display:flex;align-items:center;gap:0.75rem;padding:0.8rem 1rem;background:#060606;border-bottom:1px solid var(--border);text-decoration:none;">'
        +'<div style="width:38px;height:38px;border-radius:50%;border:2px solid var(--m);display:flex;align-items:center;justify-content:center;color:var(--m);font-size:1rem;flex-shrink:0;">▶</div>'
        +'<div style="flex:1;min-width:0;">'
          +'<div style="font-size:0.75rem;font-weight:800;color:#fff;">Watch reference video</div>'
          +'<div style="font-size:0.58rem;color:#555;margin-top:0.1rem;">Opens in '+esc(_pltLabel)+'</div>'
        +'</div>'
        +'<div style="font-size:0.75rem;color:var(--m);font-weight:800;flex-shrink:0;">↗</div>'
      +'</a>'
    : '';

  document.getElementById('gs-body').innerHTML =
    _vidBanner
    +'<div class="gs-popup-header">'
      +'<div class="gs-popup-title">'+esc(video.title||'Untitled')+'</div>'
      +'<div class="gs-popup-meta">'
        +(video.outlierScore ? '<span class="gs-popup-outlier">'+esc(video.outlierScore)+'</span>' : '')
      +'</div>'
    +'</div>'
    +(type !== 'all' ? '<div class="gs-type-label" style="padding-top:0.2rem;">'+esc(label)+'</div>' : '')
    +contentHTML;

  document.getElementById('gs-body').scrollTop = 0;
  document.getElementById('gs-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeGuideSheet() {
  document.getElementById('gs-overlay').classList.remove('open');
  document.body.style.overflow = '';
}

function gsBackdropClose(e) {
  if (e.target === document.getElementById('gs-overlay')) closeGuideSheet();
}

// ══════════════════════════════════════
// NAVIGATION
// ══════════════════════════════════════
function showPage(id) {
  document.querySelectorAll('.page').forEach(function(p){ p.classList.remove('active'); });
  var page = document.getElementById(id);
  if (page) page.classList.add('active');
  window.scrollTo(0,0);
}
function goHome()       { window.location.hash = '#home'; }
function goHub()        { window.location.href = 'index.html'; }
function goShot(id)     { window.location.hash = '#shot/'+id; }
function goGuide(id)    { window.location.hash = '#guide/'+id; }

function handleRoute() {
  var hash = window.location.hash || '#home';
  if (!hash || hash === '#home') {
    renderHome();
    showPage('page-home');
  } else if (hash.startsWith('#shot/')) {
    var _shotId = hash.replace('#shot/','');
    if (_shotId.startsWith('group-')) {
      renderGroupShots(decodeURIComponent(_shotId.replace('group-','')));
    } else if (_shotId.startsWith('person-')) {
      renderPersonShots(decodeURIComponent(_shotId.replace('person-','')));
    } else if (_shotId.startsWith('cat-')) {
      renderTagShots(_shotId.replace('cat-',''));
    } else {
      renderShot(_shotId);
    }
    showPage('page-shot');
  } else if (hash.startsWith('#guide/')) {
    renderGuide(hash.replace('#guide/',''));
    showPage('page-guide');
  } else {
    renderHome();
    showPage('page-home');
  }
}
window.addEventListener('hashchange', handleRoute);

// ══════════════════════════════════════
// MODAL — ADD VIDEO
// ══════════════════════════════════════
function closeModal(id) {
  document.getElementById(id).classList.remove('open');
}
function closeModalOnOverlay(e, id) {
  if (e.target.classList.contains('modal-overlay')) closeModal(id);
}

// ══════════════════════════════════════
// INIT — render immediately, load remote data in background
// ══════════════════════════════════════
function init() {
  handleRoute(); // instant render with hardcoded data
  Promise.all([checkEditorAccess(), loadData(), loadDoneShots(), loadGS(), loadShotsConfig(), loadCustomTags()]).then(function(){ ALL_TAGS = getAllTagsFlat(); handleRoute(); });
}
init();


function openVideoModal(url) {
  var ex = document.getElementById('vm-overlay');
  if (ex) ex.remove();
  var overlay = document.createElement('div');
  overlay.id = 'vm-overlay';
  overlay.className = 'vm-overlay';
  var wrap = document.createElement('div');
  wrap.className = 'vm-wrap';
  var closeBtn = document.createElement('button');
  closeBtn.className = 'vm-close';
  closeBtn.textContent = '✕';
  closeBtn.addEventListener('click', function() { overlay.remove(); });
  wrap.innerHTML = buildVideoEmbed(url);
  wrap.insertBefore(closeBtn, wrap.firstChild);
  overlay.appendChild(wrap);
  overlay.addEventListener('click', function(e) { if (e.target === overlay) overlay.remove(); });
  document.body.appendChild(overlay);
}

document.addEventListener("click", function(e) {
  var t = e.target;
  if (t && t.classList && (t.classList.contains("ve-embed") || t.classList.contains("vev2-embed")) && t.getAttribute("data-url")) {
    openVideoModal(t.getAttribute("data-url"));
    return;
  }
  while (t && t !== document.body) {
    if (t.classList && t.classList.contains("ve-guide-btn")) {
      openGuideSheet(t.getAttribute("data-gid"), parseInt(t.getAttribute("data-vidx") || "0", 10), "all");
      return;
    }
    // Shot-source link chips — open guide sheet for the connected video
    if (t.classList && t.classList.contains("shot-source-link")) {
      var _gid = t.getAttribute("data-gid");
      var _vidx = parseInt(t.getAttribute("data-vidx") || "0", 10);
      if (_gid) { openGuideSheet(_gid, _vidx, "all"); return; }
    }
    t = t.parentElement;
  }
});
</script>
