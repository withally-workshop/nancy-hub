<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Hello Nancy — Content Guide</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
/* ── RESET ── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{background:#000;color:#fff;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;min-height:100vh;overflow-x:hidden;-webkit-tap-highlight-color:transparent;-webkit-text-size-adjust:100%;}
button{font-family:inherit;}
/* safe area for notched phones */
.page{padding-bottom:calc(3rem + env(safe-area-inset-bottom,0px));}

/* ── TOKENS ── */
:root{
  --m:#FF00AA;
  --m-dark:#cc0088;
  --black:#000;
  --white:#fff;
  --gray:#888;
  --border:#1e1e1e;
  --card-bg:#0d0d0d;
}

/* ── APP ── */
#app{max-width:960px;margin:0 auto;min-height:100vh;}

/* ── PAGES ── */
.page{display:none;min-height:100vh;padding-bottom:3rem;}
.page.active{display:block;}

/* ── SHARED HEADER — left-aligned, same on every page ── */
.top-header{padding:2rem 1.25rem 0.5rem;text-align:left;}
.top-title{font-size:2.1rem;font-weight:900;letter-spacing:-0.03em;line-height:1;}
.top-sub{font-size:0.78rem;font-weight:700;color:#fff;margin-top:0.15rem;}

/* ── HOME BUTTON — bottom of detail pages ── */
.home-btn-wrap{padding:1.75rem 1.25rem 1rem;}
.home-btn{background:none;border:none;color:var(--m);font-size:0.95rem;font-weight:700;cursor:pointer;padding:0.5rem 0;min-height:44px;display:flex;align-items:center;gap:0.3rem;}

/* ── SECTION LABEL ── */
.section-label{display:flex;align-items:center;gap:0.75rem;padding:1.25rem 1.25rem 0.65rem;}
.section-label-text{font-size:0.7rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--gray);white-space:nowrap;}
.section-label-line{flex:1;height:1px;background:linear-gradient(to right,var(--border),transparent);}
.section-label-arrow{color:var(--m);font-size:0.85rem;}

/* ── SCROLL ROW ── */
.scroll-row{display:flex;gap:0.85rem;overflow-x:auto;padding:0 1.25rem 1.25rem;scrollbar-width:none;-ms-overflow-style:none;-webkit-overflow-scrolling:touch;}
.scroll-row::-webkit-scrollbar{display:none;}

/* ── ROW 1: SHOT CARDS ── */
.shot-card{flex-shrink:0;width:160px;border-radius:18px;overflow:hidden;cursor:pointer;border:1px solid var(--border);transition:transform 0.18s ease;-webkit-user-select:none;user-select:none;}
.shot-card:active{transform:scale(0.95);}
.shot-card-img{width:160px;height:160px;object-fit:cover;display:block;}
.shot-card-placeholder{width:160px;height:160px;background:#141414;display:flex;align-items:center;justify-content:center;font-size:3.2rem;}
.shot-card-label{background:var(--m);padding:0.65rem 0.75rem;font-size:0.75rem;font-weight:700;color:#fff;text-align:center;letter-spacing:0.04em;}
.shot-card-badge{position:absolute;top:6px;right:6px;background:var(--m);color:#fff;font-size:0.55rem;font-weight:800;padding:0.15rem 0.4rem;border-radius:10px;}
.shot-card{position:relative;}
.gs-group{margin-bottom:0.5rem;}
.gs-group-label{font-size:0.6rem;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:var(--m);padding:0.5rem 0 0.3rem;opacity:0.85;}
.gs-group-row{display:flex;gap:0.75rem;}
.gs-filter-bar{display:flex;gap:0.35rem;padding:0.5rem 1.25rem 0.75rem;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch;}
.gs-filter-bar::-webkit-scrollbar{display:none;}
.gs-filter-btn{padding:0.35rem 0.75rem;border-radius:20px;border:1px solid #222;background:#0d0d0d;color:#666;font-size:0.68rem;font-weight:700;cursor:pointer;white-space:nowrap;transition:all 0.15s;flex-shrink:0;}
.gs-filter-btn.active{border-color:var(--m);color:var(--m);background:rgba(255,0,170,0.08);}
.gs-filter-btn:hover{border-color:#444;color:#aaa;}
.gs-group-card{width:100%;border-radius:14px;overflow:hidden;cursor:pointer;border:1px solid var(--border);transition:transform 0.18s ease;margin-bottom:0.6rem;display:flex;align-items:center;gap:0.75rem;padding:0.75rem 1rem;background:#0d0d0d;}
.gs-group-card:active{transform:scale(0.97);}
.gs-group-card-emoji{font-size:1.8rem;flex-shrink:0;}
.gs-group-card-info{flex:1;min-width:0;}
.gs-group-card-title{font-size:0.82rem;font-weight:800;color:#fff;letter-spacing:0.02em;}
.gs-group-card-sub{font-size:0.62rem;color:#666;margin-top:0.15rem;}
.gs-group-card-badge{background:var(--m);color:#fff;font-size:0.58rem;font-weight:800;padding:0.2rem 0.55rem;border-radius:10px;flex-shrink:0;}
.gs-group-card-arrow{color:#333;font-size:1rem;flex-shrink:0;margin-left:0.25rem;}
.gs-detail{font-size:0.7rem;color:#777;margin-top:0.2rem;line-height:1.35;}
.gs-concepts{margin-top:0.35rem;display:flex;flex-wrap:wrap;gap:0.15rem;}
.gs-row{align-items:flex-start;padding:0.85rem 1.25rem;}
.gs-check{margin-top:0.1rem;}


/* ── PAGE 2: SHOT DETAIL ── */
.shot-detail-title{font-size:1.3rem;font-weight:800;padding:0.75rem 1.25rem 0.5rem;letter-spacing:-0.02em;}
.full-img{width:100%;aspect-ratio:16/9;object-fit:cover;display:block;}
.full-img-placeholder{width:100%;aspect-ratio:16/9;background:#141414;display:flex;align-items:center;justify-content:center;font-size:5rem;}
.shots-heading{font-size:0.82rem;font-weight:700;color:#fff;padding:1rem 1.25rem 0.35rem;}
/* Scene group: title + checklist items */
.scene-group{border-top:1px solid var(--border);}
.scene-group-title{font-size:0.78rem;font-weight:800;color:var(--m);text-transform:uppercase;letter-spacing:0.08em;padding:0.85rem 1.25rem 0.4rem;}
.scene-check-row{display:flex;align-items:center;gap:0.85rem;padding:0.6rem 1.25rem;border-bottom:1px solid #111;}
.scene-check-row:last-child{border-bottom:none;margin-bottom:0.4rem;}
.scene-check{width:24px;height:24px;min-width:24px;border:2px solid var(--m);border-radius:5px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background 0.15s;flex-shrink:0;}
.scene-check.checked{background:var(--m);}
.scene-check.checked::after{content:'✓';color:#fff;font-size:13px;font-weight:800;}
.scene-check-text{font-size:0.85rem;color:#ddd;line-height:1.4;}
.shot-source{font-size:0.65rem;color:#444;font-weight:400;display:block;margin-top:0.15rem;}

/* ── PAGE 3: GUIDE DETAIL ── */
.guide-cat-label{font-size:0.65rem;font-weight:700;text-transform:uppercase;letter-spacing:0.14em;color:var(--m);padding:0.85rem 1.25rem 0.5rem;}
.video-entry{margin:0 1rem 1.5rem;border:1px solid var(--border);border-radius:16px;overflow:hidden;background:var(--card-bg);}

/* Video embed */
.video-embed-wrap{border:3px solid var(--m);position:relative;}
.video-embed-wrap iframe{width:100%;aspect-ratio:16/9;display:block;border:none;}
.video-embed-wrap.tiktok-wrap iframe{aspect-ratio:9/16;max-height:520px;}
.video-embed-wrap.instagram-wrap iframe{aspect-ratio:4/5;max-height:520px;}
.video-placeholder{width:100%;aspect-ratio:16/9;background:#0a0a0a;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0.6rem;text-decoration:none;cursor:pointer;}
.video-play-ring{width:52px;height:52px;border-radius:50%;border:2.5px solid var(--m);display:flex;align-items:center;justify-content:center;color:var(--m);font-size:1.4rem;}
.video-platform{font-size:0.65rem;font-weight:700;color:var(--gray);letter-spacing:0.08em;text-transform:uppercase;}
.video-tap{font-size:0.72rem;color:#444;}

.video-link-bar{display:block;padding:0.45rem 0.75rem;font-size:0.65rem;color:var(--m);text-decoration:none;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;border-bottom:1px solid var(--border);}
.video-meta{display:flex;justify-content:space-between;align-items:flex-start;padding:0.7rem 0.75rem;border-bottom:1px solid var(--border);gap:0.5rem;}
.video-title{font-size:0.88rem;font-weight:700;color:#fff;flex:1;line-height:1.3;}
.video-outlier{font-size:0.72rem;font-weight:700;color:var(--m);white-space:nowrap;padding-top:0.1rem;}

/* ── VIDEO TAG — left-edge ribbon ── */
.video-embed-container{position:relative;}
.video-tag{position:absolute;left:0;top:0.85rem;background:var(--m);color:#fff;font-size:0.58rem;font-weight:800;padding:0.22rem 0.65rem 0.22rem 0.5rem;border-radius:0 20px 20px 0;letter-spacing:0.05em;z-index:3;box-shadow:2px 2px 10px rgba(255,0,170,0.35);white-space:nowrap;}

/* Side-by-side SHOTS | SCRIPT */
.ts-header{display:grid;grid-template-columns:1fr 1fr;border-top:1px solid var(--border);background:#0a0a0a;}
.ts-header-cell{padding:0.5rem 0.6rem;font-size:0.62rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:#666;}
.ts-header-cell:first-child{border-right:1px solid var(--border);}
.ts-pair{display:grid;grid-template-columns:1fr 1fr;border-top:1px solid #111;}
.ts-cell{padding:0.5rem 0.55rem;}
.ts-cell:first-child{border-right:1px solid var(--border);}
.ts-time{font-size:0.58rem;font-weight:700;color:var(--m);margin-bottom:0.15rem;}
.ts-body{font-size:0.72rem;color:#ccc;line-height:1.35;}
.ts-extra{display:none;}
.ts-extra.open{display:block;}
.ts-more-btn{width:100%;background:none;border:none;border-top:1px solid #111;padding:0.5rem;font-size:0.68rem;font-weight:700;color:var(--m);cursor:pointer;letter-spacing:0.04em;}
.ts-more-btn.open{color:#555;}

/* See Full Guide */
.full-guide-btn{width:100%;background:none;border:none;border-top:1px solid var(--border);padding:0.7rem 0.75rem;font-size:0.72rem;font-weight:700;color:var(--m);cursor:pointer;text-align:left;display:flex;justify-content:space-between;align-items:center;letter-spacing:0.04em;}
.fg-arrow{font-size:0.55rem;transition:transform 0.2s;}
.full-guide-btn.open .fg-arrow{transform:rotate(180deg);}
.full-guide-content{display:none;padding:0.75rem;font-size:0.82rem;line-height:1.65;color:#bbb;border-top:1px solid var(--border);background:#060606;white-space:pre-wrap;word-break:break-word;}
.full-guide-content.open{display:block;}

/* Empty state */
.empty-state{padding:2.5rem 1.25rem;text-align:center;color:#333;font-size:0.82rem;line-height:1.6;}

/* ── GUIDE BOTTOM SHEET ── */
.gs-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.82);z-index:1000;display:none;align-items:flex-end;justify-content:center;-webkit-backdrop-filter:blur(2px);backdrop-filter:blur(2px);}
.gs-overlay.open{display:flex;}
.gs-sheet{width:100%;max-width:600px;max-height:92vh;background:#0d0d0d;border-radius:22px 22px 0 0;display:flex;flex-direction:column;transform:translateY(100%);transition:transform 0.32s cubic-bezier(0.32,0.72,0,1);overflow:hidden;}
.gs-overlay.open .gs-sheet{transform:translateY(0);}
.gs-handle-bar{flex-shrink:0;position:relative;display:flex;align-items:center;justify-content:center;padding:0.65rem 0 0.3rem;}
.gs-handle{width:38px;height:4px;border-radius:2px;background:#2a2a2a;}
.gs-close{position:absolute;right:0.85rem;top:0.45rem;width:30px;height:30px;background:#1c1c1c;border:none;border-radius:50%;color:#666;font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1;}
.gs-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.gs-body::-webkit-scrollbar{display:none;}
.gs-embed-wrap{position:relative;}
.gs-meta{display:flex;justify-content:space-between;align-items:flex-start;padding:0.75rem 1rem;border-bottom:1px solid var(--border);gap:0.5rem;}
.gs-title{font-size:1rem;font-weight:800;flex:1;line-height:1.3;}
.gs-outlier{font-size:0.72rem;font-weight:700;color:var(--m);white-space:nowrap;padding-top:0.1rem;}
.gs-link{display:block;padding:0.45rem 1rem;font-size:0.65rem;color:var(--m);text-decoration:none;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;border-bottom:1px solid var(--border);}
.gs-section-title{font-size:0.6rem;font-weight:700;text-transform:uppercase;letter-spacing:0.12em;color:#444;padding:0.85rem 1rem 0.35rem;}
.gs-fullguide{padding:0 1rem calc(2rem + env(safe-area-inset-bottom,0px));font-size:0.84rem;line-height:1.7;color:#bbb;white-space:pre-wrap;word-break:break-word;}
.gs-no-content{padding:1.5rem 1rem;font-size:0.8rem;color:#333;font-style:italic;}
/* "Full Guide" button on video cards */
.full-guide-sheet-btn{width:100%;background:none;border:none;border-top:1px solid var(--border);padding:0.75rem 1rem;font-size:0.78rem;font-weight:700;color:var(--m);cursor:pointer;text-align:left;display:flex;justify-content:space-between;align-items:center;letter-spacing:0.03em;min-height:44px;}

/* Add-video-btn */
.add-video-btn{display:block;margin:0 1rem 1rem;background:var(--m);border:none;padding:0.6rem 1.25rem;border-radius:10px;font-size:0.8rem;font-weight:700;color:#fff;cursor:pointer;width:calc(100% - 2rem);letter-spacing:0.04em;}

/* ── HOW TO USE ── */

/* ── TAG PILLS (on video cards) ── */
.v-tags-row{display:flex;flex-wrap:wrap;gap:0.35rem;padding:0.55rem 0.75rem 0;}
.v-tag-pill{font-size:0.55rem;font-weight:800;letter-spacing:0.07em;text-transform:uppercase;padding:0.2rem 0.6rem;border-radius:20px;line-height:1.5;}
.v-tag-pill.ct{background:#1c1c1c;color:#666;border:1px solid #2a2a2a;}
.v-tag-pill.creator{background:var(--m);color:#fff;}

/* ── VIDEO DESCRIPTION ── */
.v-desc{font-size:0.76rem;color:#999;line-height:1.5;padding:0.35rem 0.75rem 0.1rem;}
.v-title-row{display:flex;justify-content:space-between;align-items:baseline;gap:0.5rem;padding:0.25rem 0.75rem 0;}
.v-title{font-size:0.88rem;font-weight:800;color:#fff;flex:1;line-height:1.3;}
.v-outlier{font-size:0.7rem;font-weight:700;color:var(--m);white-space:nowrap;}

/* ── SIDE-BY-SIDE SHOTS / SCRIPT PREVIEW ── */
.ss-wrap{border-top:1px solid var(--border);}
.ss-heads{display:grid;grid-template-columns:1fr 1fr;background:#0a0a0a;}
.ss-head{padding:0.45rem 0.7rem;font-size:0.58rem;font-weight:800;letter-spacing:0.1em;text-transform:uppercase;color:#555;}
.ss-head:first-child{border-right:1px solid var(--border);}
.ss-row{display:grid;grid-template-columns:1fr 1fr;border-top:1px solid #111;}
.ss-cell{padding:0.45rem 0.7rem;font-size:0.72rem;color:#ccc;line-height:1.4;}
.ss-cell:first-child{border-right:1px solid var(--border);}

/* ── THREE BUTTON ROW ── */
.three-btn-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:0.35rem;padding:0.6rem 0.75rem 0.8rem;}
.three-btn{background:none;border:1.5px solid #2a2a2a;color:#666;border-radius:8px;font-size:0.58rem;font-weight:800;letter-spacing:0.05em;text-transform:uppercase;padding:0.5rem 0.2rem;cursor:pointer;min-height:38px;transition:border-color 0.15s,color 0.15s;}
.three-btn:active,.three-btn:hover{border-color:var(--m);color:var(--m);}
.three-btn.primary{border-color:var(--m);color:var(--m);}

/* ── VIDEO ENTRY — two-column layout ── */
.video-entry{display:flex;gap:0.55rem;padding:0.9rem 0.75rem 1rem;border-bottom:2px solid #111;align-items:flex-start;}
.ve-left{width:126px;flex-shrink:0;}
.ve-embed{width:126px;height:176px;border:2px solid var(--m);border-radius:8px;overflow:hidden;background:#111;position:relative;}
.ve-embed iframe{width:100%;height:100%;border:none;display:block;}
.ve-embed .video-embed-wrap{border:none !important;width:100%;height:100%;position:absolute;top:0;left:0;}
.ve-embed .video-embed-wrap.tiktok-wrap iframe,.ve-embed .video-embed-wrap.instagram-wrap iframe{width:325px !important;height:580px !important;aspect-ratio:unset !important;max-height:none !important;transform:scale(0.388);transform-origin:top left;}
.ve-embed::after{content:'';position:absolute;inset:0;z-index:2;cursor:pointer;}
.ve-link{display:block;font-size:0.48rem;color:#333;margin-top:0.3rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:126px;text-decoration:none;}
.ve-link:hover{color:var(--m);}
/* ── LEFT META ── */
.ve-meta{margin-top:0.3rem;border:1px solid #111;border-radius:4px;overflow:hidden;}
.ve-meta-item{display:flex;align-items:baseline;gap:0.2rem;padding:0.1rem 0.3rem;border-bottom:1px solid #0d0d0d;}
.ve-meta-item:last-child{border-bottom:none;}
.ve-meta-lbl{font-size:0.43rem;font-weight:800;text-transform:uppercase;letter-spacing:0.07em;color:#333;white-space:nowrap;min-width:30px;}
.ve-meta-val{font-size:0.58rem;color:#666;line-height:1.3;}
/* ── LEFT TEXT BLOCKS ── */
.ve-sec-lbl{font-size:0.43rem;font-weight:800;text-transform:uppercase;letter-spacing:0.1em;color:#333;padding:0.28rem 0 0.06rem;}
.ve-text-block{font-size:0.58rem;color:#777;line-height:1.4;background:#090909;border:1px solid #111;border-radius:3px;padding:0.22rem 0.28rem;}
.ve-shot-list{margin:0;padding:0;list-style:none;}
.ve-shot-list li{font-size:0.58rem;color:#777;line-height:1.4;padding:0.08rem 0;border-bottom:1px solid #0d0d0d;}
.ve-shot-list li:last-child{border-bottom:none;}
/* ── RIGHT COLUMN ── */
.ve-right{flex:1;min-width:0;}
.ve-hdr{display:flex;justify-content:space-between;align-items:center;gap:0.3rem;margin-bottom:0.4rem;}
.ve-title{font-size:0.78rem;font-weight:800;color:#fff;line-height:1.2;flex:1;}
.ve-score{font-size:0.6rem;font-weight:700;color:var(--m);white-space:nowrap;}
/* ── RIGHT FIELD ROWS ── */
.ve-field-block{margin-bottom:0.35rem;}
.ve-field-val{font-size:0.62rem;color:#aaa;line-height:1.45;background:transparent;border:1px solid #141414;border-radius:4px;padding:0.22rem 0.38rem;margin-top:0.06rem;}
.ve-divider{border:none;border-top:1px solid #111;margin:0.45rem 0;}
/* ── TAG DISPLAY ── */
.ve-tag-category{margin-bottom:0.22rem;display:flex;flex-wrap:wrap;align-items:center;gap:0.2rem;}
.ve-tag-cat-lbl{font-size:0.42rem;font-weight:800;text-transform:uppercase;letter-spacing:0.08em;color:#2e2e2e;min-width:40px;}
.ve-tag-cat-lbl[data-cat="People"]  {color:#d966ff;}
.ve-tag-cat-lbl[data-cat="Product"] {color:#44ff99;}
.ve-tag-cat-lbl[data-cat="Location"]{color:#ffcc44;}
.ve-tag-cat-lbl[data-cat="Prop"]    {color:#44aaff;}
.ve-tag-badge{font-size:0.52rem;font-weight:700;padding:0.08rem 0.35rem;border-radius:10px;border:1px solid #222;color:#444;}
.ve-tag-badge[data-cat="People"]  {border-color:#d966ff;color:#d966ff;background:rgba(217,102,255,0.07);}
.ve-tag-badge[data-cat="Product"] {border-color:#44ff99;color:#44ff99;background:rgba(68,255,153,0.07);}
.ve-tag-badge[data-cat="Location"]{border-color:#ffcc44;color:#ffcc44;background:rgba(255,204,68,0.07);}
.ve-tag-badge[data-cat="Prop"]    {border-color:#44aaff;color:#44aaff;background:rgba(68,170,255,0.07);}
/* ── FOOTER ── */
.ve-foot{display:flex;justify-content:flex-end;margin-top:0.5rem;}
.ve-guide-btn{background:none;border:none;color:var(--m);font-size:0.65rem;font-weight:800;cursor:pointer;padding:0;}
/* ── VIDEO MODAL ── */
.vm-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.93);z-index:9999;display:flex;align-items:center;justify-content:center;padding:1rem;}
.vm-wrap{position:relative;width:min(560px,88vw);}
.vm-close{position:absolute;top:-42px;right:0;background:none;border:none;color:#fff;font-size:1.8rem;cursor:pointer;line-height:1;padding:0.2rem 0.5rem;opacity:0.85;}
.vm-close:hover{opacity:1;}
.vm-wrap .video-embed-wrap{border:2px solid var(--m);border-radius:12px;overflow:hidden;}
.vm-wrap .video-embed-wrap.tiktok-wrap iframe{width:100% !important;height:65vh !important;aspect-ratio:unset !important;max-height:none !important;transform:none !important;}
.vm-wrap .video-embed-wrap.instagram-wrap iframe{width:100% !important;height:65vh !important;aspect-ratio:unset !important;max-height:none !important;transform:none !important;}
.vm-wrap .video-embed-wrap.facebook-wrap iframe,.vm-wrap .video-embed-wrap.twitter-wrap iframe{width:100% !important;height:65vh !important;aspect-ratio:unset !important;max-height:none !important;transform:none !important;}
.vm-wrap .video-embed-wrap iframe{width:100%;height:50vh;}
.ve-embed-placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:#111;cursor:pointer;}
.ve-play{width:32px;height:32px;border:2px solid rgba(255,255,255,0.6);border-radius:50%;display:flex;align-items:center;justify-content:center;}
.ve-play::after{content:'';border-style:solid;border-width:6px 0 6px 11px;border-color:transparent transparent transparent rgba(255,255,255,0.8);margin-left:3px;}
/* ── POPUP HEADER (no embed) ── */
.gs-popup-header{padding:0.9rem 1rem 0.35rem;}
.gs-popup-title{font-size:0.95rem;font-weight:800;color:#fff;line-height:1.3;margin-bottom:0.3rem;}
.gs-popup-meta{display:flex;align-items:center;gap:0.6rem;flex-wrap:wrap;}
.gs-popup-outlier{font-size:0.65rem;font-weight:800;color:var(--m);}
.gs-popup-link{font-size:0.65rem;color:#555;text-decoration:none;}
.gs-popup-link:hover{color:var(--m);}
/* ── FULL GUIDE SECTIONS ── */
.gs-fg-body{font-size:0.82rem;color:#ccc;line-height:1.6;padding:0.45rem 1rem 0.7rem;}
.gs-fg-items{padding:0.1rem 1rem 0.7rem;}
.gs-fg-item{font-size:0.79rem;color:#bbb;line-height:1.5;padding:0.3rem 0;border-top:1px solid #111;}
.gs-fg-item:first-child{border-top:none;}
/* ── TAG FILTERS ── */
.tag-filter-wrap{padding:0 1.25rem 0.5rem;}
.tag-filter-row{display:flex;gap:0.45rem;overflow-x:auto;padding-bottom:0.1rem;scrollbar-width:none;}
.tag-filter-row::-webkit-scrollbar{display:none;}
.tag-filter-pill{flex-shrink:0;font-size:0.58rem;font-weight:800;letter-spacing:0.07em;text-transform:uppercase;padding:0.28rem 0.7rem;border-radius:20px;border:1.5px solid #2a2a2a;color:#555;background:none;cursor:pointer;white-space:nowrap;transition:border-color 0.15s,color 0.15s,background 0.15s;}
.tag-filter-pill.active{border-color:var(--m);color:var(--m);background:rgba(255,0,170,0.08);}
/* Guide-level tag filter (inside guide detail) */
.guide-tag-filter{display:flex;gap:0.35rem;flex-wrap:wrap;padding:0.6rem 0 0.75rem;}
/* Tag badges on video cards */
.ve-tags{display:flex;flex-wrap:wrap;gap:0.25rem;margin-top:0.35rem;}
.ve-tag-badge{font-size:0.52rem;font-weight:800;letter-spacing:0.06em;text-transform:uppercase;padding:0.1rem 0.38rem;border-radius:10px;border:1px solid #2a2a2a;color:#444;}

/* ── SHOT SOURCE LINKS — "connected content" chips ── */
.shot-sources-wrap{display:block;margin-top:0.25rem;}
.shot-source-link{display:inline-block;font-size:0.55rem;font-weight:800;letter-spacing:0.04em;color:var(--m);background:rgba(255,0,170,0.07);border:1px solid rgba(255,0,170,0.2);border-radius:20px;padding:0.1rem 0.45rem;cursor:pointer;margin:0.05rem 0.1rem 0 0;white-space:nowrap;font-family:inherit;}
.shot-source-link:hover,.shot-source-link:active{background:rgba(255,0,170,0.18);}
.connected-videos-section{padding:0.4rem 1.25rem 0.75rem;}
.connected-videos-label{font-size:0.62rem;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:#444;margin-bottom:0.5rem;}
.connected-videos-chips{display:flex;flex-wrap:wrap;gap:0.3rem;}

/* ── GUIDE SHEET SCENE LIST ── */
.gs-type-label{font-size:0.6rem;font-weight:800;text-transform:uppercase;letter-spacing:0.1em;color:var(--m);padding:0.9rem 1rem 0.35rem;}
.gs-scene-row{display:flex;gap:0.75rem;padding:0.55rem 1rem;border-top:1px solid #111;}
.gs-scene-time{font-size:0.6rem;font-weight:700;color:var(--m);white-space:nowrap;flex-shrink:0;min-width:56px;padding-top:0.1rem;}
.gs-scene-text{font-size:0.8rem;color:#ccc;line-height:1.45;}
.gs-script-block{margin:0 1rem 1rem;padding:1rem;background:#0a0a0a;border:1px solid var(--border);border-radius:12px;font-size:0.9rem;color:#fff;line-height:1.8;font-style:italic;}
.gs-no-scenes{padding:1rem;font-size:0.8rem;color:#333;font-style:italic;}

/* ── MODAL OVERLAY ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:999;display:none;align-items:flex-end;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal-sheet{background:#111;border-radius:20px 20px 0 0;padding:1.5rem 1.25rem 2rem;width:100%;max-width:600px;max-height:90vh;overflow-y:auto;}
.modal-title{font-size:1rem;font-weight:800;margin-bottom:1.25rem;}
.modal-field{margin-bottom:0.9rem;}
.modal-label{font-size:0.65rem;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:var(--m);display:block;margin-bottom:0.35rem;}
.modal-input,.modal-textarea{width:100%;background:#1a1a1a;border:1px solid var(--border);border-radius:8px;padding:0.6rem 0.75rem;font-size:0.85rem;color:#fff;font-family:inherit;outline:none;}
.modal-input:focus,.modal-textarea:focus{border-color:var(--m);}
.modal-textarea{resize:vertical;min-height:80px;}
.modal-hint{font-size:0.65rem;color:#444;margin-top:0.3rem;}
.modal-actions{display:flex;gap:0.75rem;margin-top:1.25rem;}
.modal-save{flex:1;background:var(--m);border:none;border-radius:10px;padding:0.65rem;font-size:0.85rem;font-weight:700;color:#fff;cursor:pointer;}
.modal-cancel{background:#1a1a1a;border:1px solid var(--border);border-radius:10px;padding:0.65rem 1rem;font-size:0.85rem;font-weight:700;color:#666;cursor:pointer;}
.modal-section-divider{font-size:0.65rem;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:#444;padding:0.75rem 0 0.5rem;border-top:1px solid var(--border);margin-top:0.25rem;}

/* ── VIDEO ENTRY V2 ── */
.video-entry-v2{border:1px solid var(--border);border-radius:18px;overflow:hidden;background:var(--card-bg);margin:0 0.75rem 1.5rem;}
.vev2-hdr{display:flex;align-items:center;justify-content:space-between;padding:0.75rem 0.85rem 0.55rem;gap:0.4rem;border-bottom:1px solid var(--border);}
.vev2-title{font-size:0.88rem;font-weight:800;color:#fff;flex:1;line-height:1.25;}
.vev2-outlier{font-size:0.72rem;font-weight:800;color:var(--m);white-space:nowrap;background:rgba(255,0,170,0.08);border:1px solid rgba(255,0,170,0.22);padding:0.18rem 0.55rem;border-radius:20px;}
.vev2-body{display:flex;align-items:flex-start;}
/* Left: phone + stats */
.vev2-left{width:126px;flex-shrink:0;padding:0.65rem 0 0.75rem 0.7rem;display:flex;flex-direction:column;}
.vev2-embed{width:100%;height:195px;border:2px solid var(--m);border-radius:10px;overflow:hidden;background:#111;position:relative;cursor:pointer;flex-shrink:0;}
.vev2-embed iframe{width:100%;height:100%;border:none;display:block;}
.vev2-embed .video-embed-wrap{border:none!important;width:100%;height:100%;position:absolute;top:0;left:0;}
.vev2-embed .video-embed-wrap.tiktok-wrap iframe,.vev2-embed .video-embed-wrap.instagram-wrap iframe{width:325px!important;height:580px!important;aspect-ratio:unset!important;max-height:none!important;transform:scale(0.388);transform-origin:top left;}
.vev2-embed .video-embed-wrap.facebook-wrap iframe,.vev2-embed .video-embed-wrap.twitter-wrap iframe{width:500px!important;height:900px!important;aspect-ratio:unset!important;max-height:none!important;transform:scale(0.252);transform-origin:top left;}
.vev2-embed::after{content:'';position:absolute;inset:0;z-index:2;cursor:pointer;}
.vev2-url{display:block;font-size:0.42rem;color:#333;margin:0.22rem 0 0.4rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;width:100%;text-decoration:none;}
.vev2-url:hover{color:var(--m);}
.vev2-stats{display:flex;flex-direction:column;gap:0.22rem;}
.vev2-stat{font-size:0.58rem;font-weight:800;padding:0.22rem 0.5rem;border-radius:20px;display:inline-block;}
.vev2-stat.s-score{background:rgba(255,0,170,0.1);border:1px solid rgba(255,0,170,0.25);color:var(--m);}
.vev2-stat.s-views{background:rgba(68,255,153,0.07);border:1px solid rgba(68,255,153,0.2);color:#44ff99;}
.vev2-stat.s-likes{background:rgba(68,170,255,0.07);border:1px solid rgba(68,170,255,0.2);color:#44aaff;}
.vev2-stat.s-hook{background:rgba(255,204,68,0.07);border:1px solid rgba(255,204,68,0.2);color:#ffcc44;}
/* Right: tags + split */
.vev2-right{flex:1;min-width:0;border-left:1px solid var(--border);}
.vev2-tags{display:flex;flex-wrap:wrap;gap:0.3rem;padding:0.55rem 0.6rem 0.45rem;border-bottom:1px solid var(--border);}
.vev2-tag{font-size:0.55rem;font-weight:800;padding:0.18rem 0.5rem;border-radius:20px;letter-spacing:0.03em;}
.vev2-tag[data-cat="People"]  {border:1px solid #d966ff;color:#d966ff;background:rgba(217,102,255,0.1);}
.vev2-tag[data-cat="Product"] {border:1px solid #44ff99;color:#44ff99;background:rgba(68,255,153,0.1);}
.vev2-tag[data-cat="Location"]{border:1px solid #ffcc44;color:#ffcc44;background:rgba(255,204,68,0.1);}
.vev2-tag[data-cat="Prop"]    {border:1px solid #44aaff;color:#44aaff;background:rgba(68,170,255,0.1);}
/* Original | Nancy columns */
.vev2-split{display:grid;grid-template-columns:1fr 1fr;}
.vev2-col{padding:0.5rem 0.5rem 0.75rem;}
.vev2-col:first-child{border-right:1px solid var(--border);}
.vev2-col-hdr{font-size:0.55rem;font-weight:900;letter-spacing:0.1em;text-transform:uppercase;padding:0.28rem 0.4rem;border-radius:20px;text-align:center;margin-bottom:0.45rem;}
.vev2-col-hdr.o{background:var(--m);color:#fff;}
.vev2-col-hdr.n{background:#88ff44;color:#000;}
.vev2-slbl{font-size:0.5rem;font-weight:800;text-transform:uppercase;letter-spacing:0.1em;color:#888;margin:0.4rem 0 0.1rem;}
.vev2-slbl:first-child{margin-top:0;}
.vev2-txt{font-size:0.6rem;color:#aaa;line-height:1.45;}
.vev2-shot{font-size:0.58rem;color:#bbb;line-height:1.4;padding:0.18rem 0;border-bottom:1px solid #0f0f0f;}
.vev2-shot:last-child{border-bottom:none;}
.vev2-hr{border:none;border-top:1px solid #111;margin:0.35rem 0;}

/* ── SHOT PROGRESS (on video cards) ── */
.shot-prog-bar{height:3px;background:#1e1e1e;border-radius:2px;margin:0.6rem 0.7rem 0;}
.shot-prog-fill{height:100%;background:var(--m);border-radius:2px;transition:width 0.3s;}
.shot-prog-label{font-size:0.58rem;font-weight:700;color:#555;padding:0.2rem 0.7rem 0.6rem;display:flex;align-items:center;justify-content:space-between;}
.shot-prog-label.all-done{color:var(--m);}
.shot-ready-badge{font-size:0.55rem;font-weight:800;background:var(--m);color:#fff;border-radius:20px;padding:0.15rem 0.5rem;letter-spacing:0.04em;}

/* ── MAIN TAB BAR ── */
.cg-main-tabs{display:flex;gap:6px;background:#111;border-radius:10px;padding:4px;margin:0.5rem 1.25rem 1rem;}
.cg-main-tab{flex:1;text-align:center;padding:0.55rem 0.5rem;border-radius:8px;font-size:0.72rem;font-weight:700;color:#555;cursor:pointer;transition:all 0.15s;white-space:nowrap;}
.cg-main-tab.active{background:var(--m);color:#fff;}
/* ── CATEGORY CARDS GRID ── */
.cat-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;padding:0 1.25rem 1rem;}
.cat-card{background:#0d0d0d;border-radius:12px;padding:1rem 0.75rem;text-align:center;border:1px solid var(--border);cursor:pointer;transition:transform 0.15s,border-color 0.15s;}
.cat-card:active{transform:scale(0.96);}
.cat-card-emoji{font-size:1.6rem;margin-bottom:0.4rem;}
.cat-card-name{font-size:0.72rem;font-weight:700;color:#ccc;line-height:1.3;}
.cat-card-badge{display:inline-block;font-size:0.52rem;font-weight:700;background:rgba(255,0,170,0.12);color:var(--m);padding:0.15rem 0.5rem;border-radius:10px;margin-top:0.4rem;letter-spacing:0.02em;}
/* ── CATEGORY DETAIL VIEW ── */
.cat-detail-header{display:flex;align-items:center;gap:0.5rem;padding:0 1.25rem 0.75rem;}
.cat-detail-back{background:none;border:none;color:var(--m);font-size:1rem;cursor:pointer;padding:0.25rem;}
.cat-detail-title{font-size:1.1rem;font-weight:800;color:#fff;}
.cat-pill-row{display:flex;gap:4px;background:#111;border-radius:8px;padding:3px;margin:0 1.25rem 1rem;width:fit-content;}
.cat-pill{padding:0.35rem 1rem;border-radius:6px;font-size:0.72rem;font-weight:700;color:#555;cursor:pointer;transition:all 0.15s;}
.cat-pill.active{background:var(--m);color:#fff;}
/* ── CONCEPT CARD (horizontal layout) ── */
.concept-card{background:#0d0d0d;border-radius:12px;overflow:hidden;border:1px solid var(--border);margin:0 1.25rem 0.75rem;}
.concept-row{display:flex;}
.concept-vid{width:180px;min-height:130px;background:#0a0a0a;flex-shrink:0;position:relative;display:flex;align-items:center;justify-content:center;overflow:hidden;}
.concept-vid iframe{width:100%;height:100%;border:none;}
.concept-vid .video-embed-wrap{border:none !important;width:100%;height:100%;position:absolute;top:0;left:0;}
.concept-vid .video-embed-wrap.tiktok-wrap iframe,.concept-vid .video-embed-wrap.instagram-wrap iframe{width:325px !important;height:580px !important;aspect-ratio:unset !important;max-height:none !important;transform:scale(0.35);transform-origin:top left;}
.concept-num{position:absolute;top:6px;left:6px;background:var(--m);color:#fff;font-size:0.6rem;font-weight:800;width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;z-index:2;}
.concept-outlier{position:absolute;top:6px;right:6px;background:rgba(13,13,13,0.85);color:#4caf50;font-size:0.55rem;font-weight:700;padding:0.1rem 0.45rem;border-radius:8px;z-index:2;}
.concept-info{padding:0.65rem 0.75rem;flex:1;display:flex;flex-direction:column;gap:0.4rem;min-width:0;}
.concept-title{font-size:0.82rem;font-weight:800;color:#fff;line-height:1.3;}
.concept-tags{display:flex;flex-wrap:wrap;gap:4px;}
.concept-tag{font-size:0.5rem;font-weight:700;padding:0.12rem 0.45rem;border-radius:6px;letter-spacing:0.03em;}
.concept-tag.t-people{background:rgba(127,119,221,0.15);color:#afa9ec;}
.concept-tag.t-product{background:rgba(29,158,117,0.15);color:#5dcaa5;}
.concept-tag.t-location{background:rgba(245,166,35,0.15);color:#fac775;}
.concept-tag.t-prop{background:rgba(216,90,48,0.15);color:#f0997b;}
.concept-tag.t-type{background:rgba(68,170,255,0.15);color:#85b7eb;}
.concept-script{font-size:0.62rem;color:#777;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.concept-script-label{font-size:0.5rem;text-transform:uppercase;letter-spacing:0.06em;color:#444;font-weight:700;}
.concept-meta{display:flex;gap:0.75rem;align-items:center;margin-top:auto;}
.concept-meta-item{font-size:0.55rem;color:#555;font-weight:600;display:flex;align-items:center;gap:0.25rem;}
/* ── SHOTS VIEW (inside category) ── */
.shot-filter-pills{display:flex;gap:6px;padding:0 1.25rem 0.75rem;flex-wrap:wrap;}
.shot-filter-pill{font-size:0.6rem;font-weight:700;padding:0.25rem 0.75rem;border-radius:20px;background:#111;color:#555;border:1px solid #222;cursor:pointer;transition:all 0.15s;}
.shot-filter-pill.active{background:var(--m);color:#fff;border-color:var(--m);}
.shot-progress-bar{margin:0 1.25rem 0.75rem;background:#111;border-radius:8px;padding:0.55rem 0.75rem;}
.shot-progress-text{display:flex;justify-content:space-between;font-size:0.68rem;margin-bottom:0.4rem;}
.shot-progress-track{background:#1a1a1a;border-radius:4px;height:6px;overflow:hidden;}
.shot-progress-fill{background:#4caf50;height:100%;border-radius:4px;transition:width 0.3s;}

/* ── RICH SHOT CARDS (Momo-style) ── */
.shot-card-rich{background:#0d0d0d;border-radius:12px;border:1px solid var(--border);margin:0 1.25rem 0.75rem;overflow:hidden;}
.shot-card-rich.done-card{opacity:0.45;}
.shot-card-header{display:flex;align-items:center;gap:0.5rem;padding:0.65rem 0.75rem;border-bottom:1px solid var(--border);}
.shot-card-check{width:18px;height:18px;border-radius:4px;border:2px solid #333;flex-shrink:0;cursor:pointer;transition:all 0.15s;display:flex;align-items:center;justify-content:center;}
.shot-card-check.done{background:#4caf50;border-color:#4caf50;}
.shot-card-check.done::after{content:'✓';color:#fff;font-size:0.65rem;font-weight:800;}
.shot-card-num{background:var(--m);color:#fff;font-size:0.55rem;font-weight:800;width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.shot-card-num.done-num{background:#4caf50;}
.shot-card-hinfo{flex:1;min-width:0;}
.shot-card-label{font-size:0.78rem;font-weight:700;color:#ccc;line-height:1.3;}
.shot-card-label.done-label{text-decoration:line-through;color:#555;}
.shot-card-framing{font-size:0.58rem;color:#555;margin-top:0.1rem;}
.shot-card-type{font-size:0.5rem;font-weight:700;padding:0.12rem 0.5rem;border-radius:10px;flex-shrink:0;text-transform:uppercase;letter-spacing:0.04em;}
.shot-card-type.t-video{background:rgba(68,170,255,0.12);color:#44aaff;}
.shot-card-type.t-photo{background:rgba(68,255,153,0.12);color:#44ff99;}
.shot-card-type.t-still{background:rgba(255,204,68,0.12);color:#ffcc44;}
.shot-card-body{display:flex;}
.shot-card-details{flex:1;padding:0.65rem 0.75rem;border-right:1px solid var(--border);min-width:0;}
.shot-card-refs{width:145px;flex-shrink:0;padding:0.65rem 0.55rem;}
.shot-field-label{font-size:0.48rem;text-transform:uppercase;letter-spacing:0.08em;color:#444;font-weight:700;margin-bottom:0.25rem;}
.shot-field-group{margin-bottom:0.55rem;}
.shot-field-group:last-child{margin-bottom:0;}
.shot-field-tags{display:flex;gap:4px;flex-wrap:wrap;}
.shot-field-tag{font-size:0.52rem;font-weight:600;padding:0.1rem 0.45rem;border-radius:8px;}
.shot-field-tag.tag-product{background:rgba(68,255,153,0.1);color:#44ff99;}
.shot-field-tag.tag-prop{background:rgba(68,170,255,0.1);color:#44aaff;}
.shot-field-tag.tag-location{background:rgba(255,204,68,0.1);color:#ffcc44;}
.shot-onset-grid{display:grid;grid-template-columns:1fr 1fr;gap:0.25rem;}
.shot-onset-item-label{font-size:0.45rem;color:#444;text-transform:uppercase;letter-spacing:0.05em;}
.shot-onset-item-value{font-size:0.62rem;color:#bbb;font-weight:600;}
.shot-recipe{font-size:0.58rem;color:#999;line-height:1.45;background:rgba(255,255,255,0.02);border-radius:6px;padding:0.3rem 0.45rem;}
.shot-director-note{font-size:0.58rem;color:#f5a623;line-height:1.45;background:rgba(245,166,35,0.05);border-radius:6px;padding:0.3rem 0.45rem;}
.shot-ref-vid{background:#111;border-radius:6px;overflow:hidden;cursor:pointer;border:1px solid #1a1a1a;margin-bottom:0.4rem;}
.shot-ref-vid:last-child{margin-bottom:0;}
.shot-ref-thumb{width:100%;height:50px;background:#0a0a0a;position:relative;display:flex;align-items:center;justify-content:center;overflow:hidden;}
.shot-ref-thumb .video-embed-wrap{border:none !important;width:100%;height:100%;position:absolute;top:0;left:0;}
.shot-ref-thumb .video-embed-wrap.tiktok-wrap iframe,.shot-ref-thumb .video-embed-wrap.instagram-wrap iframe{width:325px !important;height:580px !important;aspect-ratio:unset !important;max-height:none !important;transform:scale(0.18);transform-origin:top left;}
.shot-ref-play{width:18px;height:18px;border-radius:50%;background:rgba(255,0,170,0.5);display:flex;align-items:center;justify-content:center;}
.shot-ref-play::after{content:'';border-left:5px solid #fff;border-top:3px solid transparent;border-bottom:3px solid transparent;margin-left:1px;}
.shot-ref-info{padding:0.2rem 0.35rem;}
.shot-ref-num{font-size:0.48rem;color:var(--m);font-weight:700;}
.shot-ref-title{font-size:0.5rem;color:#666;line-height:1.25;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.shot-empty-details{font-size:0.58rem;color:#333;font-style:italic;padding:0.25rem 0;}

/* ── HOME SECTION LABELS + CONCEPT GRID ── */
.home-section-label{font-size:0.6rem;text-transform:uppercase;letter-spacing:0.12em;color:var(--m);font-weight:700;padding:0.75rem 1.25rem 0.5rem;}
.home-section-divider{border-top:1px solid var(--border);margin:0.5rem 1.25rem 0;}
.home-concept-group{margin-bottom:1rem;}
.home-concept-group-header{display:flex;align-items:center;gap:0.4rem;padding:0 1.25rem 0.5rem;}
.home-concept-group-emoji{font-size:0.9rem;}
.home-concept-group-name{font-size:0.78rem;font-weight:700;color:#fff;}
.home-concept-group-count{font-size:0.62rem;color:#666;}
.home-concept-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:0 1.25rem;}
.home-concept-card{background:#0d0d0d;border-radius:8px;border:1px solid var(--border);overflow:hidden;cursor:pointer;transition:transform 0.15s;}
.home-concept-card:active{transform:scale(0.96);}
.home-concept-thumb{width:100%;height:72px;background:#0a0a0a;overflow:hidden;position:relative;display:flex;align-items:center;justify-content:center;}
.home-concept-thumb .video-embed-wrap{border:none !important;width:100%;height:100%;position:absolute;top:0;left:0;}
.home-concept-thumb .video-embed-wrap.tiktok-wrap iframe,.home-concept-thumb .video-embed-wrap.instagram-wrap iframe{width:325px !important;height:580px !important;aspect-ratio:unset !important;max-height:none !important;transform:scale(0.22);transform-origin:top left;}
.home-concept-num{font-size:0.55rem;color:var(--m);font-weight:700;padding:0.35rem 0.45rem 0.1rem;}
.home-concept-title{font-size:0.6rem;font-weight:700;color:#ccc;padding:0 0.45rem;line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.home-concept-outlier{font-size:0.5rem;color:#4caf50;font-weight:600;padding:0.15rem 0.45rem 0.4rem;}

/* ── CONCEPT FILTER + BIG GRID (viral-outliers style) ── */
.concept-filter-pills{display:flex;gap:6px;padding:0.5rem 1.25rem 0.75rem;flex-wrap:wrap;}
.concept-filter-pill{font-size:0.62rem;font-weight:700;padding:0.3rem 0.8rem;border-radius:20px;background:#111;color:#555;border:1px solid #222;cursor:pointer;transition:all 0.15s;white-space:nowrap;}
.concept-filter-pill.active{background:var(--m);color:#fff;border-color:var(--m);}
.concept-grid-big{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;padding:0 1.25rem 1.5rem;}
.concept-card-big{background:#0d0d0d;border-radius:12px;border:1px solid var(--border);overflow:hidden;cursor:pointer;transition:transform 0.15s;}
.concept-card-big:active{transform:scale(0.97);}
.concept-card-big-thumb{width:100%;aspect-ratio:9/16;max-height:280px;background:#0a0a0a;overflow:hidden;position:relative;display:flex;align-items:center;justify-content:center;}
.concept-card-big-thumb .video-embed-wrap{border:none!important;width:100%;height:100%;position:absolute;top:0;left:0;}
.concept-card-big-thumb .video-embed-wrap.tiktok-wrap iframe,.concept-card-big-thumb .video-embed-wrap.instagram-wrap iframe{width:325px!important;height:580px!important;aspect-ratio:unset!important;max-height:none!important;transform:scale(0.62);transform-origin:top left;}
.concept-card-big-badges{position:absolute;top:8px;left:8px;display:flex;flex-direction:column;gap:4px;z-index:2;}
.concept-card-big-badge{font-size:0.5rem;font-weight:800;padding:0.18rem 0.5rem;border-radius:6px;letter-spacing:0.04em;}
.concept-card-big-badge.badge-platform{background:rgba(17,17,17,0.85);color:#fff;}
.concept-card-big-badge.badge-category{background:rgba(255,0,170,0.85);color:#fff;}
.concept-card-big-outlier{position:absolute;top:8px;right:8px;background:rgba(76,175,80,0.9);color:#fff;font-size:0.62rem;font-weight:800;padding:0.2rem 0.55rem;border-radius:6px;z-index:2;}
.concept-card-big-info{padding:0.55rem 0.65rem;}
.concept-card-big-title{font-size:0.72rem;font-weight:700;color:#ccc;line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.concept-card-big-tags{display:flex;gap:4px;flex-wrap:wrap;margin-top:0.35rem;}
.concept-card-big-tag{font-size:0.48rem;font-weight:600;padding:0.1rem 0.4rem;border-radius:8px;}

/* ── SHOOT SCHEDULE (view) ── */
.ss-block{margin:0 1.25rem 0.75rem;border:1px solid var(--border);border-radius:14px;overflow:hidden;background:#0a0a0a;}
.ss-block-header{display:flex;align-items:baseline;justify-content:space-between;padding:0.75rem 1rem 0.5rem;}
.ss-block-loc{font-size:0.95rem;font-weight:800;color:#fff;}
.ss-block-time{font-size:0.72rem;font-weight:700;color:var(--m);margin-left:0.5rem;}
.ss-block-meta{font-size:0.6rem;color:#666;font-weight:600;}
.ss-scene{padding:0.65rem 1rem;border-top:1px solid var(--border);display:flex;gap:0.65rem;align-items:flex-start;}
.ss-scene-icon{width:36px;height:36px;border-radius:8px;background:#1a1020;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:1rem;}
.ss-scene-body{flex:1;min-width:0;}
.ss-scene-label{font-size:0.76rem;font-weight:800;color:#fff;}
.ss-scene-sub{font-size:0.58rem;color:#666;margin-top:0.1rem;}
.ss-scene-right{font-size:0.58rem;color:var(--m);font-weight:700;text-align:right;flex-shrink:0;white-space:nowrap;}
.ss-concept-chip{margin-top:0.4rem;background:#111;border:1px solid #1e1e1e;border-radius:8px;padding:0.35rem 0.55rem;}
.ss-concept-chip-header{font-size:0.55rem;color:#666;font-weight:600;}
.ss-concept-chip-hook{font-size:0.68rem;color:var(--m);font-weight:700;margin-top:0.1rem;}
/* ── EDIT & PUBLISH KANBAN (view) ── */
.ep-board{display:flex;gap:0.4rem;overflow-x:auto;padding:0.5rem 1.25rem 0.5rem;scrollbar-width:none;-webkit-overflow-scrolling:touch;}
.ep-board::-webkit-scrollbar{display:none;}
.ep-col{min-width:125px;flex-shrink:0;}
.ep-col-header{display:flex;align-items:center;gap:0.3rem;padding:0.3rem 0;margin-bottom:0.35rem;}
.ep-col-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.ep-col-label{font-size:0.56rem;font-weight:800;text-transform:uppercase;letter-spacing:0.05em;color:#888;}
.ep-col-count{font-size:0.56rem;font-weight:800;color:#444;margin-left:auto;}
.ep-card{background:#111;border:1px solid var(--border);border-radius:10px;padding:0.5rem 0.55rem;margin-bottom:0.35rem;}
.ep-card-title{font-size:0.66rem;font-weight:700;color:#fff;line-height:1.3;}
.ep-card-meta{font-size:0.52rem;color:#555;margin-top:0.15rem;}

/* ── READY FOR EDITORS SECTION (home page) ── */
#ready-section{display:none;}
.ready-card{background:#0d0d0d;border:1px solid rgba(255,0,170,0.4);border-radius:12px;padding:0.65rem 0.85rem;margin:0 1.25rem 0.5rem;display:flex;align-items:center;gap:0.65rem;}
.ready-dot{width:7px;height:7px;border-radius:50%;background:var(--m);flex-shrink:0;}
.ready-card-title{font-size:0.8rem;font-weight:800;color:#fff;flex:1;line-height:1.3;}
.ready-card-sub{font-size:0.6rem;color:#555;margin-top:0.1rem;}
.ready-card-arrow{color:var(--m);font-size:0.85rem;}

/* ── DESKTOP RESPONSIVE ── */
@media(min-width:769px){
  .top-header{padding:2.5rem 2rem 0.75rem;}
  .section-label{padding:1.5rem 2rem 0.75rem;}
  .scroll-row{padding:0 2rem 1.5rem;gap:1rem;}
  .shot-card{width:180px;}
  .shot-card-img{width:180px;height:180px;}
  .shot-card-placeholder{width:180px;height:180px;}
  .gs-filter-bar{padding:0.5rem 2rem 0.75rem;}
  .gs-group-card{margin-left:2rem;margin-right:2rem;width:calc(100% - 4rem);}
  .tag-filter-wrap{padding:0 2rem 0.5rem;}
  .video-entry{padding:1rem;}
  .ve-left{width:160px;}
  .ve-embed{width:160px;height:224px;}
  .ve-link{max-width:160px;}
  .video-entry-v2{margin:0 1.25rem 1.5rem;}
  .ready-card{margin:0 2rem 0.5rem;}
  .home-btn-wrap{padding:1.75rem 2rem 1rem;}
  .shot-detail-title{padding:0.75rem 2rem 0.5rem;}
  .shots-heading{padding:1rem 2rem 0.35rem;}
  .scene-check-row{padding:0.6rem 2rem;}
  .scene-group-title{padding:0.85rem 2rem 0.4rem;}
  .guide-cat-label{padding:0.85rem 2rem 0.5rem;}
  .video-entry{margin:0 1.25rem 1.5rem;}
  .connected-videos-section{padding:0.4rem 2rem 0.75rem;}
}
@media(max-width:768px){
  #app{max-width:480px;}
}
</style>
</head>
<body>
<div id="app">

  <!-- ══ PAGE 1: HOME ══ -->
  <div class="page active" id="page-home">
    <div class="top-header" style="display:flex;align-items:flex-start;justify-content:space-between;">
      <div>
        <a href="index.html" style="text-decoration:none;color:inherit;display:block;"><div class="top-title">Hello Nancy</div></a>
        <div class="top-sub">Content Guide</div>
      </div>
    </div>

    <!-- 3-tab navigation -->
    <div id="cg-main-tabs"></div>
    <!-- Dynamic content area -->
    <div id="cg-tab-content"></div>
  </div>

  <!-- ══ PAGE 2: SHOT DETAIL ══ -->
  <div class="page" id="page-shot">
    <div class="top-header" style="display:flex;align-items:flex-start;justify-content:space-between;">
      <div>
        <div class="top-title" onclick="goHub()" style="cursor:pointer;">Hello Nancy</div>
        <div class="top-sub">Content Guide</div>
      </div>
    </div>
    <div id="shot-detail-content"></div>
  </div>

  <!-- ══ PAGE 3: GUIDE DETAIL ══ -->
  <div class="page" id="page-guide">
    <div class="top-header" style="display:flex;align-items:flex-start;justify-content:space-between;">
      <div>
        <div class="top-title" onclick="goHub()" style="cursor:pointer;">Hello Nancy</div>
        <div class="top-sub">Content Guide</div>
      </div>
    </div>
    <div id="guide-detail-content"></div>
  </div>

</div>

<!-- ══ GUIDE BOTTOM SHEET ══ -->
<div class="gs-overlay" id="gs-overlay" onclick="gsBackdropClose(event)">
  <div class="gs-sheet" id="gs-sheet">
    <div class="gs-handle-bar">
      <div class="gs-handle"></div>
      <button class="gs-close" onclick="closeGuideSheet()">✕</button>
    </div>
    <div class="gs-body" id="gs-body"></div>
  </div>
</div>

<script>
// ══════════════════════════════════════
// CONFIG
// ══════════════════════════════════════
const SUPABASE_URL = 'https://yiqniylxflulzfghujzw.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlpcW5peWx4Zmx1bHpmZ2h1anp3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwNzcwMTEsImV4cCI6MjA5MDY1MzAxMX0.ZVT3XwHkBrL1leBaQevew8G4k5syHmT5gYDznPQeAFY';
const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
const STORAGE_KEY = 'nancy_content_guide_v1';
const SHOTS_KEY = 'nancy_content_guide_shots_v1';

var doneShots = new Set();

function normShot(text) { return (text||'').trim().toLowerCase().replace(/\s+/g,' '); }
function isShotDone(text) { return doneShots.has(normShot(text)); }

async function loadDoneShots() {
  try {
    var { data } = await db.from('settings').select('value').eq('key', SHOTS_KEY).maybeSingle();
    if (data && data.value) { var v = JSON.parse(data.value); doneShots = new Set(v.done||[]); }
  } catch(e) {}
}
async function saveDoneShots() {
  try { await db.from('settings').upsert({ key: SHOTS_KEY, value: JSON.stringify({ done: Array.from(doneShots) }) }); } catch(e) {}
}
function toggleShotEl(el) {
  var text = el.getAttribute('data-shot-text');
  if (!text) return;
  var k = normShot(text);
  if (doneShots.has(k)) { doneShots.delete(k); el.classList.remove('checked'); }
  else { doneShots.add(k); el.classList.add('checked'); }
  saveDoneShots();
}

// ── GENERAL SHOTS: loaded from Supabase dynamically ──
var GS_KEY = 'nancy_content_guide_gs_v1';
var SHOTS_CONFIG_KEY = 'nancy_content_guide_shots_config_v1';
var doneGS = new Set();
var GENERAL_SHOTS = [];
var GS_GROUPS = [];
var PEOPLE_SCHEDULE = [];
var SHOOT_BLOCKS = [];
var PIPELINE = [];
var PIPELINE_STATUSES = [
  { key:'shot', label:'SHOT', color:'#888' },
  { key:'ingested', label:'INGESTED', color:'#f5a623' },
  { key:'assigned', label:'ASSIGNED', color:'#44aaff' },
  { key:'editing', label:'EDITING', color:'#ff00aa' },
  { key:'review', label:'REVIEW', color:'#d966ff' },
  { key:'approved', label:'APPROVED', color:'#4caf50' },
  { key:'published', label:'PUBLISHED', color:'#222' }
];
var videoGSMap = {};

function buildVideoGSMap() {
  videoGSMap = {};
  GENERAL_SHOTS.forEach(function(gs) {
    (gs.videoTitles||[]).forEach(function(title) {
      if (!videoGSMap[title]) videoGSMap[title] = [];
      if (videoGSMap[title].indexOf(gs.id) === -1) videoGSMap[title].push(gs.id);
    });
  });
}

async function loadShotsConfig() {
  try {
    var r = await db.from("settings").select("value").eq("key", SHOTS_CONFIG_KEY).maybeSingle();
    if (r.data && r.data.value) {
      var cfg = JSON.parse(r.data.value);
      GENERAL_SHOTS = cfg.shots || [];
      GS_GROUPS = cfg.groups || [];
      PEOPLE_SCHEDULE = cfg.schedule || [];
      SHOOT_BLOCKS = cfg.shootSchedule || [];
      PIPELINE = cfg.pipeline || [];
      // Migrate old GS_GROUP labels to new category IDs
      GS_GROUPS.forEach(function(g) {
        if (GS_GROUP_MIGRATION_MAP[g.label]) {
          var cat = CATEGORIES.find(function(c){ return c.id === GS_GROUP_MIGRATION_MAP[g.label]; });
          if (cat) g.label = cat.label;
        }
      });
    }
  } catch(e) {}
  buildVideoGSMap();
}

var activeTab = 'concepts';

function renderTabBar() {
  var el = document.getElementById('cg-main-tabs');
  if (!el) return;
  var tabs = [
    { id: 'concepts',  label: 'Shots & Concepts' },
    { id: 'schedule',  label: 'Shoot Schedule' },
    { id: 'pipeline',  label: 'Edit & Publish' }
  ];
  el.innerHTML = '<div class="cg-main-tabs">' + tabs.map(function(t) {
    return '<div class="cg-main-tab'+(activeTab===t.id?' active':'')+'" onclick="switchTab(\''+t.id+'\')">'+t.label+'</div>';
  }).join('') + '</div>';
}

function switchTab(tabId) {
  activeTab = tabId;
  renderTabBar();
  var content = document.getElementById('cg-tab-content');
  if (!content) return;
  if (tabId === 'concepts') renderConceptsTab(content);
  else if (tabId === 'schedule') showSchedulePageView(content);
  else if (tabId === 'pipeline') showPipelinePageView(content);
}

var conceptFilter = null;
function setConceptFilter(f) {
  conceptFilter = (conceptFilter === f) ? null : f;
  var wrap = document.getElementById('cg-tab-content');
  if (wrap) renderConceptsTab(wrap);
}

function renderConceptsTab(wrap) {
  var html = '';

  // Shots section label
  html += '<div class="home-section-label">Shots</div>';

  html += '<div class="cat-grid">';
  CATEGORIES.forEach(function(cat) {
    var guide = DATA.guides.find(function(g){ return g.id === cat.id; });
    var conceptCount = guide ? (guide.videos||[]).length : 0;
    var group = GS_GROUPS.find(function(g){ return g.label === cat.label; });
    var allKeys = group ? group.items.map(function(p){ return p.key; }) : [];
    var shotCount = GENERAL_SHOTS.filter(function(gs){ return allKeys.indexOf(gs.person) !== -1; }).length;
    var badgeText = conceptCount + ' concept' + (conceptCount!==1?'s':'');
    if (shotCount) badgeText += ' · ' + shotCount + ' shot' + (shotCount!==1?'s':'');
    html += '<div class="cat-card" onclick="renderCategoryDetail(\''+cat.id+'\')">'
      +'<div class="cat-card-emoji">'+cat.emoji+'</div>'
      +'<div class="cat-card-name">'+esc(cat.label)+'</div>'
      +'<div class="cat-card-badge">'+badgeText+'</div>'
      +'</div>';
  });
  html += '</div>';

  html += '<div class="home-section-divider"></div>';
  html += '<div class="home-section-label">Concepts</div>';

  // Gather ALL approved videos
  var allVideos = [];
  CATEGORIES.forEach(function(cat) {
    var guide = DATA.guides.find(function(g){ return g.id === cat.id; });
    var videos = guide ? (guide.videos||[]).filter(function(v){ return !v.status || v.status === 'approved'; }) : [];
    videos.forEach(function(v, idx) {
      allVideos.push({ video: v, catId: cat.id, catLabel: cat.label, catEmoji: cat.emoji, idx: idx });
    });
  });

  // Filter pills
  html += '<div class="concept-filter-pills">';
  html += '<div class="concept-filter-pill'+(conceptFilter===null?' active':'')+'" onclick="setConceptFilter(null)">All ('+allVideos.length+')</div>';
  CATEGORIES.forEach(function(cat) {
    var count = allVideos.filter(function(v){ return v.catId === cat.id; }).length;
    if (count) html += '<div class="concept-filter-pill'+(conceptFilter===cat.id?' active':'')+'" onclick="setConceptFilter(\''+cat.id+'\')">'+cat.emoji+' '+esc(cat.label)+' ('+count+')</div>';
  });
  html += '</div>';

  var filtered = conceptFilter ? allVideos.filter(function(v){ return v.catId === conceptFilter; }) : allVideos;

  // Big grid
  html += '<div class="concept-grid-big">';
  filtered.forEach(function(item) {
    var v = item.video;
    var platform = detectPlatform(v.url);
    var platformLabel = platform==='tiktok'?'TIKTOK':platform==='instagram'?'INSTAGRAM':platform==='youtube'?'YOUTUBE':'VIDEO';
    var embedHTML = buildVideoEmbed(v.url || null) || '';
    var tags = Array.isArray(v.tags) ? v.tags : [];

    html += '<div class="concept-card-big" onclick="showSingleVideo(\''+esc(v.title||'').replace(/\'/g,"\\'")+'\')">'
      +'<div class="concept-card-big-thumb">'
        +embedHTML
        +'<div class="concept-card-big-badges">'
          +'<span class="concept-card-big-badge badge-platform">'+platformLabel+'</span>'
          +'<span class="concept-card-big-badge badge-category">'+item.catEmoji+' '+esc(item.catLabel)+'</span>'
        +'</div>'
        +(v.outlierScore ? '<div class="concept-card-big-outlier">'+esc(v.outlierScore)+'</div>' : '')
      +'</div>'
      +'<div class="concept-card-big-info">'
        +'<div class="concept-card-big-title">'+esc(v.title||'Untitled')+'</div>';
    if (tags.length) {
      html += '<div class="concept-card-big-tags">';
      tags.slice(0,4).forEach(function(t) {
        html += '<span class="concept-card-big-tag concept-tag '+getTagClass(t)+'">'+esc(t)+'</span>';
      });
      html += '</div>';
    }
    html += '</div></div>';
  });
  html += '</div>';

  wrap.innerHTML = html;
}

function showSchedulePageView(wrap) {
  if (!wrap) wrap = document.getElementById('cg-tab-content');
  if (!wrap) return;
  var html = '<div style="padding:0.75rem 1.25rem 0.2rem;"><div style="font-size:1.2rem;font-weight:900;color:#fff;letter-spacing:-0.02em;">Shoot Schedule</div></div>';
  html += '<div style="padding:0.3rem 1.25rem 0.75rem;font-size:0.62rem;color:#555;line-height:1.6;">Bundled by <strong style="color:#888;">scene</strong>, not by concept. Every video that needs the same shot is grouped together, so you set it up <strong style="color:#888;">once</strong> and capture it for all of them.</div>';
  if (!SHOOT_BLOCKS.length) {
    html += '<div style="padding:2rem 1.25rem;text-align:center;color:#333;"><div style="font-size:2rem;margin-bottom:0.6rem;">📋</div><div style="font-size:0.78rem;font-weight:700;">No shoot schedule yet</div></div>';
  }
  SHOOT_BLOCKS.forEach(function(block) {
    var sceneCount = block.scenes ? block.scenes.length : 0;
    var shotCount = block.scenes ? block.scenes.reduce(function(sum, s) { return sum + (s.concepts ? s.concepts.length : 0); }, 0) : 0;
    html += '<div class="ss-block"><div class="ss-block-header">'
      +'<div><span class="ss-block-loc">'+esc(block.location)+'</span> <span class="ss-block-time">'+esc(block.time)+'</span></div>'
      +'<span class="ss-block-meta">'+sceneCount+' scene'+(sceneCount!==1?'s':'')+' &middot; '+shotCount+' shot'+(shotCount!==1?'s':'')+' to capture</span>'
      +'</div>';
    if (block.scenes) block.scenes.forEach(function(scene) {
      var clips = scene.concepts ? scene.concepts.length : 0;
      html += '<div class="ss-scene"><div class="ss-scene-icon">'+(scene.icon||'🎬')+'</div><div class="ss-scene-body">'
        +'<div class="ss-scene-label">'+esc(scene.label)+'</div>'
        +(scene.equipment ? '<div class="ss-scene-sub">'+esc(scene.equipment)+'</div>' : '');
      if (scene.concepts && scene.concepts.length) scene.concepts.forEach(function(c) {
        html += '<div class="ss-concept-chip"><div class="ss-concept-chip-header">Concept '+c.num+' &middot; shot '+c.shot+'</div><div class="ss-concept-chip-hook">'+esc(c.hook)+'</div></div>';
      });
      html += '</div><div class="ss-scene-right">'+clips+' clip'+(clips!==1?'s':'')+' &middot; '+clips+' concept'+(clips!==1?'s':'')+'</div></div>';
    });
    html += '</div>';
  });
  wrap.innerHTML = html;
}

function showPipelinePageView(wrap) {
  if (!wrap) wrap = document.getElementById('cg-tab-content');
  if (!wrap) return;
  var html = '<div style="padding:0.75rem 1.25rem 0.2rem;"><div style="font-size:1.2rem;font-weight:900;color:#fff;letter-spacing:-0.02em;">Edit &amp; Publish</div></div>';
  html += '<div style="padding:0.3rem 1.25rem 0.75rem;font-size:0.62rem;color:#555;line-height:1.6;">The &ldquo;upload every 1&ndash;2 hours&rdquo; engine. Each concept moves left &rarr; right; an editor owns it end to end.</div>';
  html += '<div class="ep-board">';
  PIPELINE_STATUSES.forEach(function(status) {
    var cards = PIPELINE.filter(function(c) { return c.status === status.key; });
    html += '<div class="ep-col"><div class="ep-col-header"><div class="ep-col-dot" style="background:'+status.color+';"></div>'
      +'<span class="ep-col-label">'+status.label+'</span><span class="ep-col-count">'+cards.length+'</span></div>';

async function loadData() {

function esc(str) {
  return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function detectPlatform(url) {
  if (!url) return 'unknown';
  if (/youtube\.com|youtu\.be/.test(url)) return 'youtube';
  if (/tiktok\.com/.test(url)) return 'tiktok';
  if (/instagram\.com/.test(url)) return 'instagram';
  if (/facebook\.com|fb\.watch/.test(url)) return 'facebook';
  if (/x\.com|twitter\.com/.test(url)) return 'twitter';
  if (/pinterest\.com|pin\.it/.test(url)) return 'pinterest';
  return 'other';
}

function extractYouTubeId(url) {
  var m = url.match(/(?:v=|youtu\.be\/|embed\/)([^&?/\s]{11})/);
  return m ? m[1] : null;
}
function extractTikTokId(url) {
  var m = url.match(/\/video\/(\d+)/);
  return m ? m[1] : null;
}
function extractInstagramId(url) {
  var m = url.match(/\/(?:p|reel)\/([A-Za-z0-9_-]+)/);
  return m ? m[1] : null;
}
function extractInstagramType(url) {
  return /\/reel\//.test(url) ? 'reel' : 'p';
}
function extractTweetId(url) {
  var m = url.match(/\/status\/(\d+)/);
  return m ? m[1] : null;
}

function buildVideoEmbed(url) {
  if (!url) {
    return '<div class="video-embed-wrap video-placeholder video-coming-soon">'
      +'<div class="video-play-ring" style="border-color:#2a2a2a;color:#333;">▶</div>'
      +'<div class="video-platform" style="color:#2a2a2a;">VIDEO</div>'
      +'<div class="video-tap" style="color:#2a2a2a;">Coming soon</div>'
      +'</div>';
  }
  var platform = detectPlatform(url);
  if (platform === 'youtube') {
    var id = extractYouTubeId(url);
    if (id) return '<div class="video-embed-wrap"><iframe src="https://www.youtube.com/embed/'+id+'" allow="autoplay;clipboard-write;encrypted-media;picture-in-picture" allowfullscreen loading="lazy"></iframe></div>';
  }
  if (platform === 'tiktok') {
    var id = extractTikTokId(url);
    if (id) return '<div class="video-embed-wrap tiktok-wrap"><iframe src="https://www.tiktok.com/embed/v2/'+id+'" allow="fullscreen" sandbox="allow-scripts allow-same-origin allow-popups" loading="lazy"></iframe></div>';
  }
  if (platform === 'instagram') {
    var id = extractInstagramId(url);
    var type = extractInstagramType(url);
    if (id) return '<div class="video-embed-wrap instagram-wrap"><iframe src="https://www.instagram.com/'+type+'/'+id+'/embed/" allow="autoplay;clipboard-write;encrypted-media;picture-in-picture;web-share" allowfullscreen loading="lazy" scrolling="no"></iframe></div>';
  }
  if (platform === 'facebook') {
    return '<div class="video-embed-wrap facebook-wrap"><iframe src="https://www.facebook.com/plugins/video.php?href='+encodeURIComponent(url)+'&show_text=false" allow="autoplay;clipboard-write;encrypted-media;picture-in-picture;web-share" allowfullscreen loading="lazy" scrolling="no"></iframe></div>';
  }
  if (platform === 'twitter') {
    var tid = extractTweetId(url);
    if (tid) return '<div class="video-embed-wrap twitter-wrap"><iframe src="https://platform.twitter.com/embed/Tweet.html?id='+tid+'&theme=dark&dnt=true" allow="autoplay;clipboard-write;encrypted-media;picture-in-picture" loading="lazy" scrolling="no"></iframe></div>';
  }
  var icons = { pinterest:'📌', other:'▶', unknown:'▶' };
  var labels = { pinterest:'Pinterest', other:'Video', unknown:'Video' };
  return '<a href="'+esc(url)+'" target="_blank" rel="noopener" class="video-embed-wrap video-placeholder">'
    +'<div class="video-play-ring">'+(icons[platform]||'▶')+'</div>'
    +'<div class="video-platform">'+(labels[platform]||'Video')+'</div>'
    +'<div class="video-tap">Tap to watch</div>'
    +'</a>';
}

// ══════════════════════════════════════
// PARSE TIMESTAMPED LINES
// "0:30 - description text"
// ══════════════════════════════════════
function parseTimestamps(text) {
  if (!text || !text.trim()) return [];
  return text.trim().split('\n').map(function(line){
    var m = line.match(/^([^\-]+?)\s*-\s*(.+)/);
    return m ? { time: m[1].trim(), text: m[2].trim() } : { time:'', text: line.trim() };
  }).filter(function(r){ return r.text; });
}

function renderCategoryShots(catId, filter) {
  var cat = CATEGORIES.find(function(c){ return c.id === catId; });
  if (!cat) return '';
  var group = GS_GROUPS.find(function(g){ return g.label === cat.label; });
  if (!group || !group.items || !group.items.length) {
    return '<div style="padding:2rem 1.25rem;text-align:center;color:#333;">'
      +'<div style="font-size:2rem;margin-bottom:0.6rem;">📋</div>'
      +'<div style="font-size:0.78rem;font-weight:700;">No shots defined for this category</div></div>';
  }

  var filterKeys = group.items.map(function(p){ return p.key; });
  var allShots = GENERAL_SHOTS.filter(function(gs){ return filterKeys.indexOf(gs.person) !== -1; });
  var filteredShots = filter ? allShots.filter(function(gs){ return gs.person === filter; }) : allShots;
  var doneCount = allShots.filter(function(gs){ return doneGS.has(gs.id); }).length;
  var pct = allShots.length ? Math.round(doneCount * 100 / allShots.length) : 0;

  var html = '';

  // Filter pills
  if (group.items.length > 1) {
    html += '<div class="shot-filter-pills">';
    html += '<div class="shot-filter-pill'+(filter===null?' active':'')+'" onclick="catShotFilter=null;renderCategoryDetail(\''+catId+'\',\'shots\')">All ('+allShots.length+')</div>';

  // Rich shot cards
  filteredShots.forEach(function(gs, idx) {

      return { title: title, url: found.url, num: conceptNum };
    }).filter(Boolean);

    var shotNum = idx + 1;
    var typeClass = gs.shotType === 'photo' ? 't-photo' : gs.shotType === 'still' ? 't-still' : 't-video';

        +(gs.detail ? '<div class="shot-card-framing">'+esc(gs.detail)+'</div>' : '')
      +'</div>'
      +(gs.shotType ? '<span class="shot-card-type '+typeClass+'">'+esc(typeLabel)+'</span>' : '')

    // Body: two columns (details left, reference videos right)

        if (gs.videographer || gs.talent) {
          html += '<div class="shot-field-group"><div class="shot-field-label">On set</div>'
            +'<div class="shot-onset-grid">';
          if (gs.videographer) html += '<div><div class="shot-onset-item-label">Videographer</div><div class="shot-onset-item-value">'+esc(gs.videographer)+'</div></div>';
          if (gs.talent) html += '<div><div class="shot-onset-item-label">Talent</div><div class="shot-onset-item-value">'+esc(gs.talent)+'</div></div>';
          html += '</div></div>';
        }
        if (gs.editRecipe) {
          html += '<div class="shot-field-group"><div class="shot-field-label">Edit recipe</div>'
            +'<div class="shot-recipe">'+esc(gs.editRecipe)+'</div></div>';
        }
        if (gs.directorNote) {
          html += '<div class="shot-field-group"><div class="shot-field-label">Director note</div>'
            +'<div class="shot-director-note">'+esc(gs.directorNote)+'</div></div>';
        }
      } else {
        html += '<div class="shot-empty-details">No on-set details yet</div>';
      }
      html += '</div>';

      // Right: reference videos
      if (connectedVids.length) {
        html += '<div class="shot-card-refs">'
          +'<div class="shot-field-label">Reference videos</div>';
        connectedVids.forEach(function(cv) {
          var thumbEmbed = buildVideoEmbed(cv.url) || '';
          html += '<div class="shot-ref-vid" onclick="showSingleVideo(\''+cv.title.replace(/'/g,"\\'")+'\')">'
            +'<div class="shot-ref-thumb">'+(thumbEmbed || '<div class="shot-ref-play"></div>')+'</div>'
            +'<div class="shot-ref-info">'
              +'<div class="shot-ref-num">C'+cv.num+'</div>'
              +'<div class="shot-ref-title">'+esc(cv.title)+'</div>'
            +'</div>'
            +'</div>';
        });
        html += '</div>';
      }

      html += '</div>';
    }

    html += '</div>';
  });

  return html;
}

function renderShot(id) {
  var shot = DATA.shots.find(function(s){ return s.id === id; });
  if (!shot) { goHome(); return; }
  var html = '<div style="padding:0.5rem 1.25rem;"><button class="home-btn" onclick="goHome()" style="padding:0;">← Back</button></div>';
  html += '<div class="shot-detail-title">'+esc(shot.title)+'</div>';
  (shot.scenes||[]).forEach(function(scene){
    html += '<div class="scene-group"><div class="scene-group-title">'+esc(scene.title)+'</div>';
    (scene.items||[]).forEach(function(item){
      html += '<div class="scene-check-row">'
        +'<div class="scene-check'+(isShotDone(item)?' checked':'')+'" data-shot-text="'+esc(item)+'" onclick="toggleShotEl(this)"></div>'
        +'<div class="scene-check-text">'+esc(item)+'</div></div>';
    });
    html += '</div>';
  });
  // Connected content — approved videos whose tags match this shot's subject
  if (shot.relatedTags && shot.relatedTags.length) {
    var _relVids = [];
    DATA.guides.forEach(function(g){
      (g.videos||[]).forEach(function(v,idx){
        if (!v.status || v.status === 'approved') {
          var _match = shot.relatedTags.some(function(tag){ return (v.tags||[]).indexOf(tag) !== -1; });
          if (_match) _relVids.push({ title:v.title||'Untitled', guideId:g.id, idx:idx });
        }
      });
    });
    if (_relVids.length) {
      html += '<div class="shots-heading">Connected Content</div>';
      html += '<div class="connected-videos-section"><div class="connected-videos-chips">';
      _relVids.forEach(function(vr){
        html += '<button class="shot-source-link" data-gid="'+esc(vr.guideId)+'" data-vidx="'+vr.idx+'">📹 '+esc(vr.title)+'</button>';
      });
      html += '</div></div>';
    }
  }
  document.getElementById('shot-detail-content').innerHTML = html;
  showPage('page-shot');
}

function findGSItem(personKey) {
  for (var i=0; i<GS_GROUPS.length; i++) {
    for (var j=0; j<GS_GROUPS[i].items.length; j++) {
      if (GS_GROUPS[i].items[j].key === personKey) return GS_GROUPS[i].items[j];
    }
  }
  return null;
}

function renderPersonShots(personKey) {
  var person = findGSItem(personKey);
  if (!person) { goHome(); return; }

  var shots = GENERAL_SHOTS.filter(function(gs){ return gs.person === personKey; });
  var doneCount = shots.filter(function(gs){ return doneGS.has(gs.id); }).length;

  var html = '<div style="padding:0.5rem 1.25rem;"><button class="home-btn" onclick="goHome()" style="padding:0;">← Back</button></div>';
  html += '<div class="shot-detail-title">'+person.emoji+' '+esc(personKey)+'</div>'
    +'<div id="gs-counter" data-person="'+esc(personKey)+'" style="padding:0 1.25rem 0.75rem;color:#888;font-size:0.75rem;">'+doneCount+' of '+shots.length+' shots completed</div>';

  html += shots.map(function(gs) {
    var isDone = doneGS.has(gs.id);
    var conceptLinks = (gs.videoTitles||[]).map(function(title) {
      var guideId = null, vidIdx = -1;
      DATA.guides.forEach(function(g){
        (g.videos||[]).forEach(function(v, i){
          if (v.title === title) { guideId = g.id; vidIdx = i; }
        });
      });
      if (guideId === null) return '';
      return '<button class="shot-source-link" data-gid="'+esc(guideId)+'" data-vidx="'+vidIdx+'">📹 '+esc(title)+'</button>';
    }).filter(Boolean).join('');

    return '<div class="scene-check-row gs-row">'
      +'<div class="scene-check gs-check'+(isDone?' checked':'')+'" data-gs-id="'+esc(gs.id)+'" onclick="toggleGS(this)"></div>'
      +'<div class="scene-check-text">'
        +'<strong>'+esc(gs.label)+'</strong>'
        +(gs.detail ? '<div class="gs-detail">'+esc(gs.detail)+'</div>' : '')
        +(conceptLinks ? '<div class="gs-concepts">'+conceptLinks+'</div>' : '')
      +'</div>'
      +'</div>';
  }).join('');

  document.getElementById('shot-detail-content').innerHTML = html;
  showPage('page-shot');
}

var gsGroupFilter = null;

function renderGroupShots(groupLabel) {
  var group = GS_GROUPS.find(function(g){ return g.label === groupLabel; });
  if (!group) { goHome(); return; }

  var GROUP_EMOJIS = { 'Celebrity':'🎬', 'People':'👥', 'Products':'🧃', 'Locations':'📍', 'Props & B-roll':'🎈' };
  var emoji = GROUP_EMOJIS[groupLabel] || '📋';

  var filterKeys = group.items.map(function(p){ return p.key; });
  var activeFilter = gsGroupFilter;
  if (activeFilter && filterKeys.indexOf(activeFilter) === -1) activeFilter = null;

  var allShots = GENERAL_SHOTS.filter(function(gs){ return filterKeys.indexOf(gs.person) !== -1; });
  var filteredShots = activeFilter
    ? allShots.filter(function(gs){ return gs.person === activeFilter; })
    : allShots;

  var totalAll = allShots.length;
  var doneAll = allShots.filter(function(gs){ return doneGS.has(gs.id); }).length;

  var html = '<div style="padding:0.5rem 1.25rem;"><button class="home-btn" onclick="goHome()" style="padding:0;">← Back</button></div>';
  html += '<div class="shot-detail-title">'+emoji+' '+esc(groupLabel)+'</div>'
    +'<div id="gs-counter" data-group="'+esc(groupLabel)+'" style="padding:0 1.25rem 0.5rem;color:#888;font-size:0.75rem;">'+doneAll+' of '+totalAll+' shots completed</div>';

  if (group.items.length > 1) {
    html += '<div class="gs-filter-bar">';
    html += '<button class="gs-filter-btn'+(activeFilter===null?' active':'')+'" onclick="gsGroupFilter=null;renderGroupShots(\''+groupLabel.replace(/'/g,"\\'")+'\')">All</button>';
    group.items.forEach(function(p) {
      html += '<button class="gs-filter-btn'+(activeFilter===p.key?' active':'')+'" onclick="gsGroupFilter=\''+p.key.replace(/'/g,"\\'")+'\';renderGroupShots(\''+groupLabel.replace(/'/g,"\\'")+'\')">'+p.emoji+' '+esc(p.short)+'</button>';
    });
    html += '</div>';
  }

  var currentPerson = null;
  filteredShots.forEach(function(gs) {
    if (gs.person !== currentPerson) {
      currentPerson = gs.person;
      var item = group.items.find(function(p){ return p.key === gs.person; });
      var pEmoji = item ? item.emoji : '';
      var pDone = allShots.filter(function(s){ return s.person === gs.person && doneGS.has(s.id); }).length;
      var pTotal = allShots.filter(function(s){ return s.person === gs.person; }).length;
      html += '<div style="padding:0.6rem 1.25rem 0.25rem;display:flex;align-items:center;justify-content:space-between;">'
        +'<div style="font-size:0.68rem;font-weight:800;color:var(--m);text-transform:uppercase;letter-spacing:0.08em;">'+pEmoji+' '+esc(gs.person)+'</div>'
        +'<div style="font-size:0.58rem;color:#555;font-weight:700;">'+pDone+'/'+pTotal+'</div>'
        +'</div>';
    }

    var isDone = doneGS.has(gs.id);
    var conceptLinks = (gs.videoTitles||[]).map(function(title) {
      var guideId = null, vidIdx = -1;
      DATA.guides.forEach(function(g){
        (g.videos||[]).forEach(function(v, i){
          if (v.title === title) { guideId = g.id; vidIdx = i; }
        });
      });
      if (guideId === null) return '';
      return '<button class="shot-source-link" data-gid="'+esc(guideId)+'" data-vidx="'+vidIdx+'">📹 '+esc(title)+'</button>';
    }).filter(Boolean).join('');

    html += '<div class="scene-check-row gs-row">'
      +'<div class="scene-check gs-check'+(isDone?' checked':'')+'" data-gs-id="'+esc(gs.id)+'" onclick="toggleGS(this)"></div>'
      +'<div class="scene-check-text">'
        +'<strong>'+esc(gs.label)+'</strong>'
        +(gs.detail ? '<div class="gs-detail">'+esc(gs.detail)+'</div>' : '')
        +(conceptLinks ? '<div class="gs-concepts">'+conceptLinks+'</div>' : '')
      +'</div>'
      +'</div>';
  });

  document.getElementById('shot-detail-content').innerHTML = html;
  showPage('page-shot');
}

function toggleGS(el) {
  var id = el.getAttribute('data-gs-id');
  if (!id) return;
  if (doneGS.has(id)) { doneGS.delete(id); el.classList.remove('checked'); }
  else { doneGS.add(id); el.classList.add('checked'); }
  saveGS();
  var counter = document.getElementById('gs-counter');
  if (counter) {
    var groupLabel = counter.getAttribute('data-group');
    if (groupLabel) {
      var group = GS_GROUPS.find(function(g){ return g.label === groupLabel; });
      if (group) {
        var allKeys = group.items.map(function(p){ return p.key; });
        var groupShots = GENERAL_SHOTS.filter(function(gs){ return allKeys.indexOf(gs.person) !== -1; });
        var done = groupShots.filter(function(gs){ return doneGS.has(gs.id); }).length;
        counter.textContent = done+' of '+groupShots.length+' shots completed';
      }
    } else {
      var person = counter.getAttribute('data-person');
      var personShots = GENERAL_SHOTS.filter(function(gs){ return gs.person === person; });
      var done = personShots.filter(function(gs){ return doneGS.has(gs.id); }).length;
      counter.textContent = done+' of '+personShots.length+' shots completed';
    }
  }
}

function renderTagShots(categoryKey) {
  var categoryTags = getAllTags(categoryKey);
  if (!categoryTags || !categoryTags.length) { goHome(); return; }

  var CATEGORY_LABELS = { 'People':'People Scenes', 'Location':'Location Scenes', 'Product':'Product Scenes', 'Prop':'Prop Scenes' };
  var label = CATEGORY_LABELS[categoryKey] || categoryKey;

  var approvedVideoRefs = [];
  DATA.guides.forEach(function(g){
    (g.videos||[]).forEach(function(v, idx){
      if (!v.status || v.status === 'approved') {
        approvedVideoRefs.push({ v:v, guideId:g.id, idx:idx });
      }
    });
  });

  var sections = categoryTags.map(function(tag){
    var taggedRefs = approvedVideoRefs.filter(function(vr){ return (vr.v.tags||[]).indexOf(tag) !== -1; });
    var shotMap = {};
    taggedRefs.forEach(function(vr){
      var shotList = (vr.v.productionShots && vr.v.productionShots.length) ? vr.v.productionShots : (vr.v.shots||[]);
      shotList.forEach(function(shot){
        var key = shot.trim().toLowerCase();
        if (!shotMap[key]) shotMap[key] = { text: shot.trim(), sources: [] };
        var already = shotMap[key].sources.some(function(s){ return s.guideId === vr.guideId && s.idx === vr.idx; });
        if (!already) shotMap[key].sources.push({ title: vr.v.title||'Untitled', guideId: vr.guideId, idx: vr.idx });
      });
    });
    return { tag: tag, shots: Object.keys(shotMap).map(function(k){ return shotMap[k]; }) };
  }).filter(function(s){ return s.shots.length > 0; });

  if (!sections.length) {
    document.getElementById('shot-detail-content').innerHTML =
      '<div style="padding:0.5rem 1.25rem;"><button class="home-btn" onclick="goHome()" style="padding:0;">← Back</button></div>'
      +'<div class="shot-detail-title">'+esc(label)+'</div>'
      +'<div style="padding:1rem 1.25rem;color:#444;font-size:0.8rem;">No shots yet — tag videos and add production shots in the editor to build this list.</div>';
    return;
  }

  var sectionsHTML = sections.map(function(s){
    var items = s.shots.map(function(item){
      var sourceLinks = item.sources.map(function(src){
        return '<button class="shot-source-link" data-gid="'+esc(src.guideId)+'" data-vidx="'+src.idx+'">📹 '+esc(src.title)+'</button>';
      }).join('');
      return '<div class="scene-check-row">'
        +'<div class="scene-check'+(isShotDone(item.text)?' checked':'')+'" data-shot-text="'+esc(item.text)+'" onclick="toggleShotEl(this)"></div>'
        +'<div class="scene-check-text">'+esc(item.text)
          +(sourceLinks ? '<span class="shot-sources-wrap">'+sourceLinks+'</span>' : '')
        +'</div>'
        +'</div>';
    }).join('');
    return '<div class="scene-group">'
      +'<div class="scene-group-title">'+esc(s.tag)+'</div>'
      +items
      +'</div>';
  }).join('');

  document.getElementById('shot-detail-content').innerHTML =
    '<div style="padding:0.5rem 1.25rem;"><button class="home-btn" onclick="goHome()" style="padding:0;">← Back</button></div>'
    +'<div class="shot-detail-title">'+esc(label)+'</div>'
    +'<div class="shots-heading">Compiled Shot List</div>'
    +sectionsHTML;
}
